// GLOSSARY (accessible from header)
// =====================================================================
const GLOSSARY = [
  // ===== Channel geometry & hydrology =====
  { cat: 'Channel geometry', term: 'Bankfull', def: 'The elevation at which water just begins to overflow the channel onto the floodplain. Indicators: change in slope, top of point bars, vegetation lines, change in bank materials. Bankfull flow has a 1–2 year recurrence interval and does most channel-shaping work.' },
  { cat: 'Channel geometry', term: 'Bankfull width (BFW)', def: 'Horizontal distance between the bankfull elevations on the left and right banks, measured perpendicular to flow. Reach-averaged BFW determines width category and transect spacing.' },
  { cat: 'Channel geometry', term: 'Wetted channel', def: 'The portion of the streambed currently covered by water. Typically narrower than the bankfull channel. Wetted dimensions vary with discharge; bankfull dimensions do not.' },
  { cat: 'Channel geometry', term: 'Wetted perimeter', def: 'The length of the wetted boundary in cross section (the contact line between water and bed/banks). Used in hydraulic radius calculations.' },
  { cat: 'Channel geometry', term: 'Hydraulic radius (R)', def: 'Cross-sectional area ÷ wetted perimeter. A measure of channel "efficiency" — higher R means more water moves with less friction.' },
  { cat: 'Channel geometry', term: 'Thalweg', def: 'The line of deepest flow along the channel — usually where a fish would migrate through. Tracks the dynamic axis of the stream and shifts with channel evolution.' },
  { cat: 'Channel geometry', term: 'Cross section', def: 'A vertical slice across the channel perpendicular to flow. Measured at every odd transect with bankfull and wetted depths at 11 evenly spaced points.' },
  { cat: 'Channel geometry', term: 'Floodplain', def: 'The flat area adjacent to the channel inundated by floods larger than bankfull. Functioning floodplains attenuate flood peaks, store sediment, and recharge groundwater.' },
  { cat: 'Channel geometry', term: 'Terrace', def: 'An abandoned floodplain surface, now elevated above the active channel. Often confused with bankfull during site layout — terraces have soil structure and perennial vegetation; the active floodplain may not.' },
  { cat: 'Channel geometry', term: 'Sinuosity', def: 'Ratio of channel length (along the thalweg) to valley length. Sinuosity > 1.5 is a meandering channel; < 1.3 is straight.' },
  { cat: 'Channel geometry', term: 'Gradient', def: 'Channel slope, expressed as % or m/m. Riffles typically > 1%; pools and runs typically < 1%. Measured longitudinally over the reach.' },
  { cat: 'Channel geometry', term: 'Reach', def: 'A stretch of stream with consistent geomorphic and hydraulic characteristics — the unit of analysis in habitat assessment.' },

  // ===== Channel units =====
  { cat: 'Channel units', term: 'Channel unit', def: 'A localized, relatively homogeneous area of channel — pool, riffle, or run — distinguished by gradient, bedform, substrate, and flow character. Tier I habitat type. Minimum length: typically 1 channel-width.' },
  { cat: 'Channel units', term: 'Pool', def: 'Low gradient (<1%), smooth flow, lateral and longitudinal concavity (the bed dips in two directions). Cover and rest habitat. Subtypes: scour, plunge, dam, lateral-scour, trench.' },
  { cat: 'Channel units', term: 'Riffle', def: 'Steeper gradient (>1%), coarse substrate (cobble/boulder), turbulent surface flow. Oxygenates water; supports invertebrates; prime spawning gravel for salmonids.' },
  { cat: 'Channel units', term: 'Run (glide)', def: 'Low gradient like a pool but uniform depth and no concavity. Smooth laminar flow. Travel corridor; sometimes called a "glide" in low-gradient systems.' },
  { cat: 'Channel units', term: 'Step-pool', def: 'Sequence of vertical steps (boulder/log dams) and short pools, common in steep mountain streams. Each step dissipates energy; pools store sediment.' },
  { cat: 'Channel units', term: 'Cascade', def: 'Steep, fast, highly turbulent flow over a chaotic mix of boulders. Gradient typically > 4%. Few salmonids except as transient passage.' },
  { cat: 'Channel units', term: 'Pool tail-out', def: 'The downstream end of a pool where water shallows and accelerates into the next unit. Critical spawning habitat for many salmonids.' },
  { cat: 'Channel units', term: 'Pool-riffle ratio', def: 'A reach-level metric: total pool length ÷ total riffle length, or counts thereof. Healthy salmonid streams typically have a roughly balanced ratio (~1:1).' },

  // ===== Substrate =====
  { cat: 'Substrate', term: 'Substrate', def: 'The bed material — silt, sand, gravel, cobble, boulder, or bedrock. Sized by b-axis with a gravelometer or ruler. A primary control on benthic habitat and fish reproduction.' },
  { cat: 'Substrate', term: 'B-axis', def: 'The intermediate of three orthogonal axes of a particle. Used because it determines what size square opening the particle can pass through. Always smaller than the longest (a-axis) and larger than the shortest (c-axis).' },
  { cat: 'Substrate', term: 'Cobble embeddedness', def: 'How buried a cobble is in fine sediment. Calculated as % buried × % surrounding fines / 100. High embeddedness = poor habitat (less interstitial space for invertebrates and fish eggs).' },
  { cat: 'Substrate', term: 'Fines', def: 'Particles < 2 mm. Silt and clay (smooth between fingers) classified as "fines"; sand (gritty) classified as "sand". Excessive fines indicate erosion problems upstream.' },
  { cat: 'Substrate', term: 'Gravelometer', def: 'A template (typically a metal plate) with square openings used to classify particle b-axis size. Particle is recorded as the smallest opening it does NOT fit through.' },
  { cat: 'Substrate', term: 'Wolman pebble count', def: 'A standardized random-walk sampling method where ~100 particles are blind-picked from the streambed and measured. The basis for D-statistics like D50, D84.' },
  { cat: 'Substrate', term: 'D50 / D84 / D16', def: 'Percentile sizes from a particle-size distribution. D50 (median) is what most reports lead with; D84 indicates the size of "armor" stones; D16 marks fine-end mobility.' },
  { cat: 'Substrate', term: 'Armoring', def: 'A bed condition where coarse particles concentrate at the surface, protecting finer material below. Indicates flow-regulated streams or sediment-starved reaches.' },
  { cat: 'Substrate', term: 'Sorting', def: 'How uniform particle sizes are. Well-sorted = narrow size range; poorly sorted = wide range. Sorting tells you about flow energy variability.' },

  // ===== Riparian & cover =====
  { cat: 'Riparian & cover', term: 'Undercut bank', def: 'A continuous cave-like feature in the streambank formed by overhanging material (root mat, sod, rock). Qualifies as habitat if depth ≥ 20 cm, length ≥ 1 m, ceiling ≤ 1 m above water, and provides cover.' },
  { cat: 'Riparian & cover', term: 'Large woody debris (LWD)', def: 'Wood pieces ≥ 10 cm diameter and ≥ 1 m long within the bankfull channel. Creates pools, traps sediment, provides cover. Counted by size class, location, and orientation.' },
  { cat: 'Riparian & cover', term: 'Riparian zone', def: 'The vegetation community along stream banks. Provides shade (temperature control), root reinforcement (bank stability), allochthonous inputs (food web), and LWD recruitment.' },
  { cat: 'Riparian & cover', term: 'Canopy cover', def: 'Percent of the channel shaded by overhead vegetation, measured with a densiometer. Drives water temperature, primary production, and habitat suitability for cold-water species.' },
  { cat: 'Riparian & cover', term: 'Cover (fish)', def: 'Any feature that provides protection from predators or hydraulic stress: undercut banks, LWD, boulders, overhanging vegetation, deep water, turbulence. Quantified per unit.' },

  // ===== Survey methodology =====
  { cat: 'Survey methodology', term: 'Transect', def: 'A sampling line across the channel, perpendicular to flow. The basic spatial framework for systematic measurements; 11 transects span the reach in this protocol.' },
  { cat: 'Survey methodology', term: 'BOS / TOS', def: 'Bottom Of Site / Top Of Site. Surveys work upstream from BOS to TOS so disturbance of the bed doesn\'t cloud water at downstream measurements.' },
  { cat: 'Survey methodology', term: 'Width category', def: 'A standardized bucket the site falls into based on average bankfull width (6, 8, 10, 12, 14, 16, 18, 20 m). Determines transect spacing and total reach length (10× spacing).' },
  { cat: 'Survey methodology', term: 'Site marker', def: 'A permanent physical reference (rebar with tag, or labeled tree) at BOS and TOS that allows the site to be relocated for re-survey in subsequent years.' },
  { cat: 'Survey methodology', term: 'Densiometer', def: 'Convex or spherical mirror with a grid, held over the channel to estimate canopy cover. Readings averaged across cardinal directions.' },
  { cat: 'Survey methodology', term: 'Stadia rod', def: 'Graduated measuring rod used vertically to read depths or horizontally with a level for elevation surveys. The "depth rod" in cross-section work.' },
  { cat: 'Survey methodology', term: 'Bankfull indicators', def: 'Field cues used to identify bankfull elevation: slope break (vertical bank to horizontal floodplain), top of point bars, perennial-vegetation lower limit, change in bank particle size, undercut tops, stain lines.' },
  { cat: 'Survey methodology', term: 'QA/QC', def: 'Quality assurance / quality control. In habitat surveys: independent re-measurement of a subset of transects to verify within-crew and between-crew precision.' },

  // ===== Hydrology =====
  { cat: 'Hydrology', term: 'Discharge (Q)', def: 'Volume of water passing a cross section per unit time (m³/s or cfs). Q = A × V where A is cross-sectional area and V is mean velocity.' },
  { cat: 'Hydrology', term: 'Stage', def: 'Water surface elevation at a fixed point — read from a staff gauge. Stage-discharge curves convert easy stage readings into discharge estimates.' },
  { cat: 'Hydrology', term: 'Manning equation', def: 'Empirical equation relating velocity to channel characteristics: V = (1/n)·R^(2/3)·S^(1/2). The standard for open-channel flow estimation.' },
  { cat: 'Hydrology', term: 'Manning\'s n', def: 'Roughness coefficient. Smooth concrete ≈ 0.013; cobble streams ≈ 0.035; boulder/wood-jammed streams 0.05+. Selecting n is the largest source of uncertainty in Manning estimates.' },
  { cat: 'Hydrology', term: 'Recurrence interval', def: 'Average time between flow events of a given magnitude. Bankfull flow is typically the 1.5-year event; the 100-year flood is the 1%-annual-exceedance event.' },
  { cat: 'Hydrology', term: 'Base flow', def: 'The portion of streamflow from groundwater discharge — what\'s left when surface runoff has receded. Critical for cold-water fish in dry seasons.' },

  // ===== Biota & habitat metrics =====
  { cat: 'Biota & habitat', term: 'Salmonid', def: 'Family Salmonidae — salmon, trout, char, whitefish. The primary indicator group for Pacific Northwest stream habitat assessments.' },
  { cat: 'Biota & habitat', term: 'Redd', def: 'A nest dug by a spawning female salmonid in clean gravel of a riffle or pool tail-out. Visible as an oval pit-and-mound feature; redd surveys quantify spawning use.' },
  { cat: 'Biota & habitat', term: 'Macroinvertebrate', def: 'Aquatic insects and other invertebrates retained on a 500-µm net. Community composition is a sensitive indicator of water quality and substrate condition.' },
  { cat: 'Biota & habitat', term: 'EPT taxa', def: 'Ephemeroptera (mayflies), Plecoptera (stoneflies), Trichoptera (caddisflies). Sensitive to pollution; high EPT diversity indicates good water quality.' },
  { cat: 'Biota & habitat', term: 'Allochthonous input', def: 'Organic matter (leaves, wood, terrestrial insects) entering the stream from outside. The dominant energy source in small forested streams.' },
];

const GLOSSARY_CATEGORIES = ['Channel geometry', 'Channel units', 'Substrate', 'Riparian & cover', 'Survey methodology', 'Hydrology', 'Biota & habitat'];

// Per-stage rationale — the "why" behind each protocol step
const WHY = [
  {
    id: 'layout',
    stage: 'Site Layout',
    headline: 'Why find bankfull and lay out 11 transects?',
    sections: [
      {
        h: 'Why bankfull, specifically?',
        p: 'Bankfull is the elevation at which water just starts to overflow onto the floodplain. It corresponds to the flow that does the most channel-shaping work over geologic time — the so-called <b>effective discharge</b>, with a recurrence interval of about 1.5 years. Because bankfull dimensions reflect the channel\'s long-term hydraulic geometry, they\'re reproducible year to year, even when today\'s flow is high or low. Wetted dimensions, by contrast, change daily.'
      },
      {
        h: 'Why average 5 widths?',
        p: 'Bankfull indicators are often ambiguous in the field. Slope breaks can be subtle, vegetation lines confused with terraces, stain marks misleading. Averaging 5 measurements taken roughly one stream-width apart smooths out individual reading errors and gives a stable estimate of channel size. One-off bad readings get diluted; consistent under- or over-estimation across all 5 reveals a methodological problem.'
      },
      {
        h: 'Why scale site length to channel size?',
        p: 'Habitat features (pool spacing, meander wavelength, large wood frequency) all scale with channel width. A reach that\'s short relative to channel size will miss this variability — you might land entirely in one pool or one riffle and call it the whole stream. The 10× rule (site length = 10 × width category) ensures you capture roughly 5–7 channel-unit cycles, enough for stable summary statistics.'
      },
      {
        h: 'Why discrete width categories instead of using BFW directly?',
        p: 'Categories (6, 8, 10, 12 m…) make data <b>comparable across sites</b>. Two surveyors at two sites with BFW = 7.4 m and 7.6 m both use 8 m spacing — their cross-sections are at directly comparable positions. Without categorization, every site has bespoke spacing and you can\'t pool data.'
      },
      {
        h: 'Why work upstream from BOS to TOS?',
        p: 'Walking and measuring kicks up sediment. Working upstream means disturbance from each transect drifts <i>away</i> from subsequent measurements, not into them. Cleaner water = better visibility for substrate calls and pebble counts.'
      },
    ],
    note: 'Site layout is the foundation. Get it wrong and every downstream measurement is comparing apples to oranges across sites or years.',
  },
  {
    id: 'crosssection',
    stage: 'Cross Section',
    headline: 'Why measure 11 depths across the channel?',
    sections: [
      {
        h: 'Why two depths (bankfull AND wetted)?',
        p: '<b>Bankfull depth</b> describes the channel\'s long-term capacity — independent of today\'s flow. <b>Wetted depth</b> reflects current habitat. The pair lets you compute (a) how much channel is currently filled (a flow indicator), and (b) channel capacity for high-flow modeling. Together they answer "what is this channel built for?" and "what is it doing today?"'
      },
      {
        h: 'Why 11 points?',
        p: 'Eleven equally spaced depths — including the two bank endpoints (depth = 0 by definition) — capture the channel\'s shape with enough resolution to compute <b>mean depth, max depth, cross-sectional area, and hydraulic radius</b> using the trapezoidal rule. Fewer points miss the thalweg or sand bars; many more points are diminishing returns relative to field-measurement error.'
      },
      {
        h: 'Why every odd transect, not every transect?',
        p: 'Cross sections are time-consuming. Sampling at every odd transect (1, 3, 5, 7, 9, 11) gives 6 cross-sections per reach — enough to detect within-reach variability without doubling field time. Even-numbered transects are still used for other measurements (substrate, vegetation) but skip the depth profile.'
      },
      {
        h: 'What do these data feed into?',
        p: 'Cross-section area × velocity = <b>discharge</b>. Mean depth and hydraulic radius feed Manning\'s equation for velocity estimates. Width-to-depth ratio is a key channel-classification metric (Rosgen, Montgomery–Buffington). Year-over-year changes flag aggradation, incision, or widening — early warning signs of disturbance upstream.'
      },
    ],
    note: 'Cross sections are the most quantitatively rich measurement in the protocol. A good cross-section dataset can support hydraulic modeling years after the survey.',
  },
  {
    id: 'units',
    stage: 'Channel Units',
    headline: 'Why classify pools, riffles, and runs?',
    sections: [
      {
        h: 'Why does the distinction matter?',
        p: 'Salmonids and other stream organisms use these units differently. Adult salmon hold in <b>pools</b> for cover and rest. They spawn in clean gravel of <b>riffles</b> or <b>pool tail-outs</b>. Juveniles rear in pool margins and slow runs. Macroinvertebrates concentrate in oxygen-rich riffles. A reach that\'s all run or all riffle supports a different fish community than one with a balanced sequence.'
      },
      {
        h: 'Why care about counts and ratios?',
        p: 'Healthy salmonid streams typically show a <b>roughly balanced pool-to-riffle ratio</b> (1:1 by count, with pools slightly longer). Channels with too few pools (often from sediment fill or wood removal) lose adult holding habitat. Channels with too few riffles (often from impoundments) lose spawning area and oxygenation. The unit inventory is a quick diagnostic.'
      },
      {
        h: 'Why is this hard to do consistently?',
        p: 'The boundary between a "deep run" and a "shallow pool" is judgment-dependent. Different surveyors can call the same reach 12 units or 18 units. The protocol mitigates this by requiring (a) <b>minimum unit length ≥ 1 channel width</b> (so micro-features don\'t inflate counts), and (b) <b>multiple criteria</b> — gradient AND substrate AND flow character must all suggest the same call before you log it.'
      },
      {
        h: 'How does this connect to other measurements?',
        p: 'Substrate sampling is weighted toward riffles (because riffles are where spawning happens). Pool surveys focus on residual depth and cover. LWD inventories often record the unit each piece occupies. Channel units are the spatial filing system for almost everything else.'
      },
    ],
    note: 'Tier I habitat classification (pool/riffle/run) is the most basic stream geomorphology — and the most argued about. Two experienced biologists will still disagree on 10–20% of unit calls.',
  },
  {
    id: 'substrate',
    stage: 'Substrate',
    headline: 'Why count rocks?',
    sections: [
      {
        h: 'Why pebble counts at all?',
        p: 'Substrate composition controls <b>spawning success, invertebrate diversity, and channel stability</b>. Salmonid eggs need clean, well-oxygenated gravel — too many fines smother them. Stoneflies and mayflies (sensitive water-quality indicators) need cobble interstices to hide in. Channel armor (a coarse surface layer) protects against scour. The particle-size distribution tells you which of these the streambed currently supports.'
      },
      {
        h: 'Why blind-pick particles instead of choosing them?',
        p: 'Surveyors have an unconscious bias toward <b>memorable particles</b> — interesting ones, big ones, easy-to-grab ones. Reaching down without looking and picking the first thing you feel removes that bias. The result is a sample that more faithfully represents the bed surface.'
      },
      {
        h: 'Why prioritize riffles?',
        p: 'Riffles are where the fish-relevant substrate processes happen — spawning gravel, invertebrate habitat, oxygenation through gravel interstices. They\'re also where bedload transport is most active and substrate composition reflects flow history most clearly. Pool substrate, by contrast, accumulates fines passively and tells you less about active channel processes.'
      },
      {
        h: 'Why measure embeddedness separately?',
        p: 'Particle-size counts capture only what\'s on the surface. <b>Embeddedness</b> tells you what\'s happening below the surface — how much fine sediment has packed in around the cobbles. A reach can have great surface-cobble counts but be functionally dead for spawning if 80% of those cobbles are buried in sand. Embeddedness > 30% generally indicates degraded conditions.'
      },
      {
        h: 'Why measure b-axis (the middle dimension)?',
        p: 'Particles are sorted by water based on what fits through what. The b-axis controls whether a particle can pass through a sieve opening or flow regime. Using a-axis (longest) over-represents flat stones; c-axis (shortest) under-represents them. B-axis is the dimension that physically matters for transport and for fitting into a gravelometer template.'
      },
    ],
    note: 'Pebble counts are the standard for sediment monitoring in wadeable streams. The Wolman method (this protocol\'s ancestor) has been the field standard since 1954.',
  },
  {
    id: 'undercut',
    stage: 'Undercut Banks',
    headline: 'Why these specific qualifying criteria?',
    sections: [
      {
        h: 'Why undercuts at all?',
        p: 'Undercut banks are <b>premium fish cover</b>. They provide overhead protection from avian predators, refuge from high flows, and shaded cool water. Larger trout and adult salmon strongly prefer undercuts to most other cover types. A reach with abundant qualifying undercuts can support disproportionately high adult fish biomass.'
      },
      {
        h: 'Why depth ≥ 20 cm?',
        p: 'A bank "lip" of less than 20 cm is just an overhang — fish can\'t actually shelter under it. The 20-cm threshold is set so the feature must be deep enough to fully cover an adult salmonid (a mature steelhead or coho is roughly that tall).'
      },
      {
        h: 'Why length ≥ 1 m?',
        p: 'Short undercuts (a few tens of cm) are typically incidental scour features around a single root or boulder. They come and go with high flows. Continuous undercuts ≥ 1 m are stable features rooted in the bank structure (sod, root mat, cohesive sediment) and persist across years.'
      },
      {
        h: 'Why ceiling ≤ 1 m above water?',
        p: 'A higher ceiling means the "undercut" is really a partly hollow bank — fish can\'t use the upper void without leaving the water. The 1-m cap restricts the feature to the genuinely fish-occupiable cavity.'
      },
      {
        h: 'Why "must provide cover at sampling time"?',
        p: 'An undercut that\'s above the current water surface (dewatered) provides zero habitat right now, however it might function in spring high water. The protocol records what fish actually have access to today, not what they might have at peak flow.'
      },
    ],
    note: 'Every criterion exists to filter out features that <i>look</i> like cover but don\'t function as cover. Strict criteria mean undercut counts are comparable across sites and years.',
  },
];

const EQUATIONS = [
  {

window.__openGlossary = (initialTab = 'terms', focusWhyId = null) => {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position: fixed; inset: 0; background: rgba(40,30,10,0.7); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; animation: fadein 0.2s;';

  let searchQuery = '';

  const renderTermsContent = () => {
    const q = searchQuery.trim().toLowerCase();
    const filter = (g) => !q || g.term.toLowerCase().includes(q) || g.def.toLowerCase().includes(q);
    const filtered = GLOSSARY.filter(filter);
    if (filtered.length === 0) {
      return `<div style="padding: 30px; text-align: center; color: var(--ink-faint); font-style: italic;">No terms match "${searchQuery}".</div>`;
    }

    if (q) {
      return `<dl style="margin: 0;">
        ${filtered.map(g => `
          <div style="margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px dotted var(--ink-faint);">
            <div style="display: flex; justify-content: space-between; align-items: baseline; gap: 8px; margin-bottom: 4px;">
              <dt class="display" style="font-size: 18px; color: var(--rust); margin: 0;">${highlight(g.term, q)}</dt>
              <span style="font-family: 'JetBrains Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-faint);">${g.cat}</span>
            </div>
            <dd style="margin: 0; font-size: 14px; line-height: 1.55; color: var(--ink-soft);">${highlight(g.def, q)}</dd>
          </div>
        `).join('')}
      </dl>`;
    }

    return GLOSSARY_CATEGORIES.map(cat => {
      const inCat = GLOSSARY.filter(g => g.cat === cat);
      if (inCat.length === 0) return '';
      return `
        <section style="margin-bottom: 28px;">
          <h3 style="margin: 0 0 12px; font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--rust); padding-bottom: 6px; border-bottom: 2px solid var(--ink);">${cat} <span style="color: var(--ink-faint); font-weight: normal;">· ${inCat.length}</span></h3>
          <dl style="margin: 0;">
            ${inCat.map(g => `
              <div style="margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px dotted var(--ink-faint);">
                <dt class="display" style="font-size: 17px; color: var(--ink); margin: 0 0 3px;">${g.term}</dt>
                <dd style="margin: 0; font-size: 13.5px; line-height: 1.55; color: var(--ink-soft);">${g.def}</dd>
              </div>
            `).join('')}
          </dl>
        </section>
      `;
    }).join('');
  };

  const renderWhyContent = () => `
    <div style="font-size: 14px; color: var(--ink-soft); line-height: 1.55; margin-bottom: 24px; padding: 14px 18px; background: rgba(192,138,42,0.08); border-left: 3px solid var(--gold);">
      <b>This isn\'t just procedure.</b> Each step in the protocol exists for a reason — usually because biologists tried it the other way and got worse data. Knowing the <i>why</i> helps you make better field decisions when the protocol can\'t cover every situation.
    </div>
    <nav style="display: flex; gap: 6px; margin-bottom: 22px; flex-wrap: wrap;">
      ${WHY.map((w, i) => `
        <a href="#why-${w.id}" style="padding: 6px 12px; border: 1.5px solid var(--ink); background: var(--paper); color: var(--ink); font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; text-decoration: none;">
          <span style="opacity: 0.5;">${(i+1).toString().padStart(2,'0')}</span> ${w.stage}
        </a>
      `).join('')}
    </nav>
    ${WHY.map(w => `
      <article id="why-${w.id}" style="margin-bottom: 36px; scroll-margin-top: 20px;">
        <div style="font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--rust); margin-bottom: 4px;">Stage · ${w.stage}</div>
        <h3 class="display" style="margin: 0 0 18px; font-size: 24px; line-height: 1.2;">${w.headline}</h3>
        ${w.sections.map(s => `
          <div style="margin-bottom: 18px;">
            <h4 style="margin: 0 0 6px; font-size: 15px; color: var(--ink); font-weight: 700;">${s.h}</h4>
            <p style="margin: 0; font-size: 14px; line-height: 1.65; color: var(--ink-soft);">${s.p}</p>
          </div>
        `).join('')}
        ${w.note ? `
          <div style="margin-top: 12px; padding: 12px 16px; background: rgba(74,104,120,0.08); border-left: 3px solid var(--water-2); font-size: 13px; line-height: 1.55; font-style: italic; color: var(--ink-soft);">
            ${w.note}
          </div>
        ` : ''}
      </article>
    `).join('')}
  `;

  const renderInner = (tab) => `
    <div class="panel glossary-inner" style="max-width: 880px; width: 100%; max-height: 88vh; overflow-y: auto; padding: clamp(20px, 3vw, 36px);">
      <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; gap: 16px; flex-wrap: wrap;">
        <div>
          <h2 class="display" style="margin: 0; font-size: clamp(26px, 4vw, 34px);">Reference</h2>
          <p style="margin: 4px 0 0; font-style: italic; color: var(--ink-soft); font-size: 14px;">Glossary, equations, and the rationale behind each step.</p>
        </div>
        <button class="btn glossary-close-btn" style="font-size: 11px;">✕ Close</button>
      </div>

      <!-- Tabs -->
      <div style="display: flex; gap: 0; border-bottom: 2px solid var(--ink); margin-bottom: 18px; flex-wrap: wrap;">
        ${[
          ['why', `Why? · ${WHY.length}`],
          ['terms', `Glossary · ${GLOSSARY.length}`],
          ['equations', `Equations · ${EQUATIONS.length}`],
        ].map(([key, label]) => `
          <button class="glossary-tab" data-tab="${key}"
                  style="background: ${tab === key ? 'var(--ink)' : 'transparent'};
                         color: ${tab === key ? 'var(--paper)' : 'var(--ink)'};
                         border: 2px solid var(--ink); border-bottom: none;
                         padding: 8px 18px; font-family: 'JetBrains Mono', monospace;
                         font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
                         cursor: pointer; margin-right: -2px;
                         ${tab === key ? 'transform: translateY(2px);' : ''}">
            ${label}
          </button>
        `).join('')}
      </div>

      ${tab === 'why' ? renderWhyContent() : ''}
      ${tab === 'terms' ? `
        <div style="margin-bottom: 18px; position: relative;">
          <input type="text" class="glossary-search" placeholder="Search terms…" value="${searchQuery.replace(/"/g, '&quot;')}"
                 style="width: 100%; padding: 10px 14px 10px 36px; font-family: 'Newsreader', serif; font-size: 14px; border: 1.5px solid var(--ink); background: var(--paper); color: var(--ink);"/>
          <span style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--ink-faint); pointer-events: none;">⌕</span>
        </div>
        <div class="glossary-content">
          ${renderTermsContent()}
        </div>
      ` : ''}
      ${tab === 'equations' ? `
        <div style="display: flex; flex-direction: column; gap: 24px;">
          ${EQUATIONS.map(e => renderEquation(e)).join('')}
        </div>
      ` : ''}
    </div>
  `;

  overlay.innerHTML = renderInner(initialTab);
  document.body.appendChild(overlay);

  let currentTab = initialTab;

  const close = () => { overlay.remove(); document.removeEventListener('keydown', onKey); };
  const wire = () => {
    overlay.querySelector('.glossary-close-btn').addEventListener('click', close);
    overlay.querySelectorAll('.glossary-tab').forEach(b => {
      b.addEventListener('click', () => {
        currentTab = b.dataset.tab;
        searchQuery = '';
        overlay.innerHTML = renderInner(currentTab);
        wire();
      });
    });
    const searchInput = overlay.querySelector('.glossary-search');
    if (searchInput) {
      searchInput.addEventListener('input', (e) => {
        searchQuery = e.target.value;
        const contentEl = overlay.querySelector('.glossary-content');
        if (contentEl) contentEl.innerHTML = renderTermsContent();
      });
      if (window.matchMedia('(min-width: 901px)').matches) searchInput.focus();
    }
  };
  wire();

  // If a specific WHY id was requested, scroll into view
  if (initialTab === 'why' && focusWhyId) {
    setTimeout(() => {
      const el = overlay.querySelector(`#why-${focusWhyId}`);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 50);
  }

  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) close();
  });
  const onKey = (e) => { if (e.key === 'Escape') close(); };
  document.addEventListener('keydown', onKey);
};

// Highlight matched substring in search results
function highlight(text, q) {
  if (!q) return text;
  const idx = text.toLowerCase().indexOf(q);
  if (idx < 0) return text;
  return text.slice(0, idx) +
    '<mark style="background: rgba(192,138,42,0.35); color: var(--ink); padding: 1px 2px;">' +
    text.slice(idx, idx + q.length) +
    '</mark>' +
    text.slice(idx + q.length);
}

function renderEquation(e) {
  return `
    <div style="border: 1.5px solid var(--ink); background: rgba(255, 250, 240, 0.5);">
      <!-- Header -->
      <div style="background: var(--ink); color: var(--paper); padding: 10px 16px;">
        <h3 class="display" style="margin: 0; font-size: 19px; line-height: 1.2;">${e.name}</h3>
      </div>
      <div style="padding: 16px 18px;">
        <!-- Formula -->
        <div style="background: var(--paper-2); border-left: 4px solid var(--rust);
                    padding: 14px 18px; margin-bottom: 14px;
                    font-family: 'JetBrains Mono', monospace; font-size: 15px;
                    line-height: 1.7; overflow-x: auto;">
          ${e.formula}
        </div>

        <!-- Where -->
        ${e.where ? `
          <div style="margin-bottom: 14px;">
            <div style="font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--ink-soft); margin-bottom: 8px;">Where</div>
            <table style="width: 100%; border-collapse: collapse; font-size: 13px;">
              ${e.where.map(([sym, desc]) => `
                <tr style="border-bottom: 1px dotted var(--ink-faint);">
                  <td style="padding: 5px 12px 5px 0; font-family: 'JetBrains Mono', monospace; color: var(--rust); white-space: nowrap; vertical-align: top; width: 1%;">${sym}</td>
                  <td style="padding: 5px 0; color: var(--ink-soft); line-height: 1.5;">${desc}</td>
                </tr>
              `).join('')}
            </table>
          </div>
        ` : ''}

        <!-- Lookup table (for width categories) -->
        ${e.table ? `
          <div style="margin-bottom: 14px; overflow-x: auto;">
            <table style="width: 100%; border-collapse: collapse; font-family: 'JetBrains Mono', monospace; font-size: 12px;">
              <thead>
                <tr style="background: var(--paper-2); border-bottom: 2px solid var(--ink);">
                  ${e.table.headers.map(h => `<th style="padding: 6px 10px; text-align: left;">${h}</th>`).join('')}
                </tr>
              </thead>
              <tbody>
                ${e.table.rows.map(r => `
                  <tr style="border-bottom: 1px dotted var(--ink-faint);">
                    ${r.map(c => `<td style="padding: 5px 10px;">${c}</td>`).join('')}
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        ` : ''}

        <!-- Worked example -->
        ${e.example ? `
          <div style="background: rgba(74,125,61,0.08); border-left: 4px solid var(--green-ok); padding: 12px 16px; margin-bottom: 12px;">
            <div style="font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--green-ok); margin-bottom: 8px;">${e.example.title}</div>
            <div style="font-size: 13px; line-height: 1.7; color: var(--ink);">
              <div style="margin-bottom: 6px;"><b>Given:</b> ${e.example.given}</div>
              <div style="margin-bottom: 6px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink-soft);">${e.example.step}</div>
              <div style="font-weight: 600; color: var(--rust);"><b style="color: var(--ink-soft); font-weight: normal; font-size: 12px;">→</b> ${e.example.answer}</div>
            </div>
          </div>
        ` : ''}

        <!-- Note -->
        ${e.note ? `
          <div style="font-size: 12px; color: var(--ink-faint); font-style: italic; line-height: 1.55;">
            ${e.note}
          </div>
        ` : ''}
      </div>
    </div>
  `;
}

// =====================================================================
// INITIAL RENDER
// =====================================================================
render();
</script>
