<!-- Stream Transect Simulator -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f0e8d6">
<style>
  :root {
    --paper: #f0e8d6;
    --paper-2: #e8dec5;
    --paper-shadow: #d4c8a8;
    --ink: #2a2418;
    --ink-soft: #5a4f38;
    --ink-faint: #8a7e60;
    --water: #6b8c9e;
    --water-2: #4a6878;
    --water-deep: #2c4654;
    --bank: #a89070;
    --bank-2: #876e4e;
    --grass: #6b7d4a;
    --grass-2: #4d5e34;
    --rust: #b4471f;
    --rust-soft: #c46943;
    --gold: #c08a2a;
    --pool: #4a6878;
    --riffle: #c46943;
    --run: #8aa66e;
    --green-ok: #4a7d3d;
    --red-bad: #a83a2c;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: 'Newsreader', 'Iowan Old Style', 'Palatino', 'Book Antiqua', Georgia, serif;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(0,0,0,0.06), transparent 60%),
      radial-gradient(ellipse at 80% 90%, rgba(0,0,0,0.08), transparent 60%),
      var(--paper);
    color: var(--ink);
    min-height: 100vh;
    background-attachment: fixed;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence baseFrequency='0.9' numOctaves='2' seed='3'/><feColorMatrix values='0 0 0 0 0.16  0 0 0 0 0.14  0 0 0 0 0.09  0 0 0 0.10 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    pointer-events: none;
    opacity: 0.6;
    z-index: 0;
    mix-blend-mode: multiply;
  }
  #app { position: relative; z-index: 1; }
  .display { font-family: 'Cormorant Garamond', 'Playfair Display', Georgia, serif; font-weight: 600; letter-spacing: -0.01em; }
  .hand { font-family: 'Caveat', 'Bradley Hand', 'Comic Sans MS', cursive; }
  .mono { font-family: 'JetBrains Mono', 'Courier Prime', 'Courier New', monospace; }
  button { font-family: inherit; cursor: pointer; }
  /* Subtle paper "fold" shadow on cards */
  .panel {
    background: linear-gradient(180deg, var(--paper) 0%, var(--paper-2) 100%);
    border: 1px solid var(--paper-shadow);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.5) inset,
      0 2px 8px rgba(40,30,10,0.08),
      0 12px 24px rgba(40,30,10,0.06);
  }

  /* Hand-drawn link decoration */
  .underline-wavy {
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 8' width='60' height='8'><path d='M0 4 Q 7.5 0 15 4 T 30 4 T 45 4 T 60 4' stroke='%23b4471f' stroke-width='1.6' fill='none'/></svg>");
    background-repeat: repeat-x;
    background-position: 0 95%;
    background-size: 60px 8px;
    padding-bottom: 4px;
  }

  /* The "stamp" headers */
  .stamp {
    display: inline-block;
    border: 2px solid var(--rust);
    color: var(--rust);
    padding: 4px 14px;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-size: 11px;
    transform: rotate(-1.5deg);
    background: rgba(250, 240, 220, 0.4);
  }

  /* Buttons */
  .btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 10px 20px;
    border: 1.5px solid var(--ink);
    background: var(--paper);
    color: var(--ink);
    transition: all 0.15s;
    box-shadow: 3px 3px 0 var(--ink);
  }
  .btn:hover { } /* placeholder; real hover scoped below */
  @media (hover: hover) {
    .btn:hover:not(:disabled) { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--ink); }
  }
  .btn:active:not(:disabled) { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--ink); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: 1px 1px 0 var(--ink); }
  .btn-primary { background: var(--rust); color: var(--paper); border-color: var(--rust); box-shadow: 3px 3px 0 var(--ink); }
  @media (hover: hover) {
    .btn-primary:hover:not(:disabled) { background: var(--rust-soft); }
  }
  .btn-ghost { border-style: dashed; box-shadow: none; }
  @media (hover: hover) {
    .btn-ghost:hover:not(:disabled) { box-shadow: 2px 2px 0 var(--ink); }
  }

  /* Tooltips and tags */
  .tag {
    display: inline-block;
    padding: 2px 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 1px solid currentColor;
  }

  /* Toast messages */
  .toast-stack {
    position: fixed; top: 24px; right: 24px; z-index: 100;
    display: flex; flex-direction: column; gap: 8px;
    pointer-events: none;
  }
  .toast {
    background: var(--paper);
    border: 1.5px solid var(--ink);
    box-shadow: 3px 3px 0 var(--ink);
    padding: 10px 16px;
    max-width: 320px;
    font-size: 14px;
    animation: toast-in 0.3s ease-out;
  }
  .toast.ok { border-color: var(--green-ok); border-left-width: 6px; }
  .toast.bad { border-color: var(--red-bad); border-left-width: 6px; }
  .toast.info { border-color: var(--gold); border-left-width: 6px; }
  @keyframes toast-in {
    from { transform: translateX(40px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  /* SVG cursors */
  .cursor-tape { cursor: crosshair; }
  .cursor-pin { cursor: pointer; }
  .cursor-rod { cursor: ns-resize; }

  /* Form inputs */
  input[type="number"], input[type="text"], select {
    font-family: 'JetBrains Mono', monospace;
    background: rgba(255,250,240,0.7);
    border: 1px solid var(--ink-faint);
    border-bottom: 2px solid var(--ink);
    padding: 6px 10px;
    font-size: 13px;
    color: var(--ink);
    width: 100px;
  }
  input:focus, select:focus { outline: none; border-color: var(--rust); }

  /* small hover state */
  .hover-lift { transition: transform 0.15s; }
  @media (hover: hover) {
    .hover-lift:hover { transform: translateY(-2px); }
  }

  /* Animation */
  @keyframes fadein { from { opacity: 0; transform: translateY(8px);} to {opacity:1; transform: translateY(0);} }
  .fadein { animation: fadein 0.4s ease-out; }
  @keyframes ripple {
    0% { r: 0; opacity: 0.6; }
    100% { r: 30; opacity: 0; }
  }
  .ripple { animation: ripple 0.7s ease-out forwards; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--paper-2); }
  ::-webkit-scrollbar-thumb { background: var(--ink-soft); border: 2px solid var(--paper-2); }

  /* ----- Responsive layout helpers ----- */
  .stack-2col {
    display: grid;
    gap: 24px;
    grid-template-columns: 1fr 360px;
  }
  @media (max-width: 900px) {
    .stack-2col { grid-template-columns: 1fr; }
    .stack-2col > .sidebar { order: 2; }
  }

  /* Bigger touch targets on smaller / touch screens */
  @media (max-width: 900px) {
    .btn { min-height: 44px; padding: 12px 20px; }
    input[type="number"], input[type="text"], select { min-height: 40px; font-size: 14px; }
  }

  /* ----- Coach marks (teaching tooltips) ----- */
  .coach {
    position: fixed;
    z-index: 150;
    max-width: 320px;
    background: var(--ink);
    color: var(--paper);
    padding: 14px 16px 12px;
    box-shadow: 4px 4px 0 var(--rust), 0 12px 32px rgba(0,0,0,0.25);
    font-size: 14px;
    line-height: 1.5;
    animation: coach-in 0.35s ease-out;
  }
  .coach::after {
    content: '';
    position: absolute;
    width: 14px; height: 14px;
    background: var(--ink);
    transform: rotate(45deg);
  }
  .coach.arrow-top::after    { top: -7px;    left: 24px; }
  .coach.arrow-left::after   { left: -7px;   top: 50%; margin-top: -7px; }
  .coach.arrow-right::after  { right: -7px;  top: 50%; margin-top: -7px; }
  .coach.arrow-bottom::after { bottom: -7px; left: 24px; }
  .coach .coach-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--rust-soft);
    margin-bottom: 6px;
  }
  .coach .coach-body { color: var(--paper); }
  .coach .coach-dismiss {
    margin-top: 10px;
    background: transparent;
    border: 1px solid var(--paper);
    color: var(--paper);
    padding: 6px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s;
  }
  .coach .coach-dismiss:hover { background: var(--paper); color: var(--ink); }
  @keyframes coach-in {
    from { opacity: 0; transform: scale(0.94); }
    to { opacity: 1; transform: scale(1); }
  }
  /* Spotlight ring for the coach target element */
  .coach-spotlight {
    position: fixed;
    z-index: 149;
    pointer-events: none;
    border: 3px solid var(--rust);
    box-shadow: 0 0 0 9999px rgba(40,30,10,0.5);
    animation: coach-pulse 1.6s ease-in-out infinite;
  }
  @keyframes coach-pulse {
    0%, 100% { box-shadow: 0 0 0 9999px rgba(40,30,10,0.45), 0 0 0 0 var(--rust); }
    50% { box-shadow: 0 0 0 9999px rgba(40,30,10,0.55), 0 0 0 8px rgba(180,71,31,0.3); }
  }

  /* Make HTML inputs not zoom on iOS */
  @media (max-width: 600px) {
    input, select, button { font-size: 16px; }
  }

  /* Print friendliness */
  @media print {
    body::before { display: none; }
    .toast-stack, .coach, .coach-spotlight { display: none !important; }
    .panel { box-shadow: none; break-inside: avoid; }
  }
</style>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Newsreader:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Caveat:wght@400;500;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<div id="app"></div>
<div class="toast-stack" id="toasts"></div>

<script>
// =====================================================================
// RIFFLE RUN
// A multi-stage interactive teaching tool for stream habitat assessment
// =====================================================================

// ---------- TOAST SYSTEM ----------
const toastEl = document.getElementById('toasts');
function toast(msg, kind = 'info', ms = 3500) {
  const el = document.createElement('div');
  el.className = `toast ${kind}`;
  el.innerHTML = msg;
  toastEl.appendChild(el);
  // tiny notification chirp for toasts
  if (kind === 'ok') sfx.success();
  else if (kind === 'bad') sfx.error();
  else sfx.notify();
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; setTimeout(() => el.remove(), 350); }, ms);
}

// ---------- AUDIO SYSTEM ----------
// All sounds are synthesized in real time via Web Audio API — no asset files,
// keeps the simulator self-contained. Mute toggle persists in localStorage.
const audioState = {
  ctx: null,
  muted: (() => {
    try { return localStorage.getItem('riffleRunMuted') === '1'; } catch (e) { return false; }
  })(),
  unlocked: false,
};
function setMuted(m) {
  audioState.muted = m;
  try { localStorage.setItem('riffleRunMuted', m ? '1' : '0'); } catch (e) {}
  // Update mute toggle if visible
  const btn = document.getElementById('mute-btn');
  if (btn) btn.textContent = m ? '🔇 Sound off' : '🔊 Sound on';
}
function ensureAudio() {
  if (audioState.ctx) return audioState.ctx;
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return null;
    audioState.ctx = new Ctx();
  } catch (e) { return null; }
  return audioState.ctx;
}
// Audio "unlock" — most browsers require a user gesture before playing
document.addEventListener('pointerdown', () => {
  if (audioState.unlocked) return;
  const ctx = ensureAudio();
  if (!ctx) return;
  if (ctx.state === 'suspended') ctx.resume();
  audioState.unlocked = true;
}, { once: false });

// Helper: generate a quick envelope-shaped tone
function tone({ freq = 440, duration = 0.18, type = 'sine', attack = 0.005, release = 0.08, volume = 0.18, freqEnd = null, delay = 0 }) {
  if (audioState.muted) return;
  const ctx = ensureAudio();
  if (!ctx) return;
  const now = ctx.currentTime + delay;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, now);
  if (freqEnd != null) osc.frequency.exponentialRampToValueAtTime(Math.max(20, freqEnd), now + duration);
  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(volume, now + attack);
  gain.gain.linearRampToValueAtTime(volume * 0.6, now + duration - release);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
  osc.connect(gain).connect(ctx.destination);
  osc.start(now);
  osc.stop(now + duration + 0.02);
}
// Helper: short noise burst (for splashes/clicks)
function noise({ duration = 0.12, volume = 0.08, filterFreq = 1500, filterQ = 1, lowpass = true, delay = 0 }) {
  if (audioState.muted) return;
  const ctx = ensureAudio();
  if (!ctx) return;
  const now = ctx.currentTime + delay;
  const len = Math.max(1, Math.floor(ctx.sampleRate * duration));
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < len; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const filt = ctx.createBiquadFilter();
  filt.type = lowpass ? 'lowpass' : 'bandpass';
  filt.frequency.value = filterFreq;
  filt.Q.value = filterQ;
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(volume, now);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
  src.connect(filt).connect(gain).connect(ctx.destination);
  src.start(now);
}

// Named sound effects per interaction
const sfx = {
  // Water drop / tap on stream — soft "ploop"
  waterDrop() {
    tone({ freq: 480, freqEnd: 220, duration: 0.16, type: 'sine', volume: 0.16, attack: 0.002, release: 0.05 });
    noise({ duration: 0.05, volume: 0.04, filterFreq: 800 });
  },
  // Pin / flag set — wooden tap
  pinSet() {
    tone({ freq: 320, freqEnd: 220, duration: 0.07, type: 'triangle', volume: 0.13, attack: 0.001, release: 0.02 });
    noise({ duration: 0.03, volume: 0.05, filterFreq: 2200 });
  },
  // Depth rod measurement — splash + tone pitched by depth
  depthRod(depthMeters = 0.3) {
    // Deeper measurements → lower pitch
    const freq = 600 - Math.min(0.9, depthMeters) * 350;
    noise({ duration: 0.18, volume: 0.07, filterFreq: 2000 });
    tone({ freq, freqEnd: freq * 0.7, duration: 0.22, type: 'sine', volume: 0.12, delay: 0.02 });
  },
  // Channel-unit boundary — soft chime
  chime() {
    tone({ freq: 660, duration: 0.14, type: 'sine', volume: 0.12 });
    tone({ freq: 880, duration: 0.18, type: 'sine', volume: 0.08, delay: 0.04 });
  },
  // Particle picked up — small dry "click"
  particlePick() {
    tone({ freq: 220, freqEnd: 180, duration: 0.04, type: 'square', volume: 0.06 });
    noise({ duration: 0.04, volume: 0.04, filterFreq: 3000, lowpass: false });
  },
  // Correct answer
  success() {
    tone({ freq: 523.25, duration: 0.10, type: 'sine', volume: 0.13 }); // C
    tone({ freq: 783.99, duration: 0.16, type: 'sine', volume: 0.12, delay: 0.08 }); // G
  },
  // Wrong / soft fail
  error() {
    tone({ freq: 220, duration: 0.10, type: 'sine', volume: 0.10 });
    tone({ freq: 165, duration: 0.16, type: 'sine', volume: 0.10, delay: 0.07 });
  },
  // Generic notification
  notify() {
    tone({ freq: 880, duration: 0.06, type: 'sine', volume: 0.05 });
  },
  // Stage complete — ascending chord
  stageComplete() {
    tone({ freq: 392.00, duration: 0.18, type: 'sine', volume: 0.12 });             // G
    tone({ freq: 523.25, duration: 0.20, type: 'sine', volume: 0.12, delay: 0.10 }); // C
    tone({ freq: 659.25, duration: 0.24, type: 'sine', volume: 0.13, delay: 0.20 }); // E
    tone({ freq: 783.99, duration: 0.30, type: 'sine', volume: 0.13, delay: 0.30 }); // G
  },
  // Page / button tick
  tick() {
    tone({ freq: 1000, duration: 0.025, type: 'square', volume: 0.04 });
  },
  // Toggle
  toggle() {
    tone({ freq: 700, duration: 0.04, type: 'triangle', volume: 0.07 });
  },
};
window.__sfx = sfx;

// ---------- COACH MARK SYSTEM ----------
// Shows a friendly tooltip the first time a user reaches a new interaction,
// pointing at a target element. Each coach mark fires once per session.
const seenCoachMarks = new Set();
let activeCoach = null;
let activeSpotlight = null;

const COACH_MARKS = {
  layout_first_click: {
    stage: 'layout',
    when: () => state.bankfullMeasurements.length === 0 && state.stage === 'layout',
    targetSelector: '#layout-svg',
    label: 'Coach mark · 1 of 1',
    body: 'See the pulsing red ring on the stream? <b>Click it</b>. That records your first bankfull-width measurement at the bottom of the site. Four more to go after this.',
    arrow: 'top',
  },
  layout_transects: {
    stage: 'layout',
    when: () => state.bankfullMeasurements.length === 5 && state.transectsPlaced === 0 && state.stage === 'layout',
    targetSelector: '#layout-svg',
    label: 'New step',
    body: "Now place <b>11 transects</b> upstream. The simulator highlights where each one goes — just click near the red dashed line.",
    arrow: 'top',
  },
  crosssection_first: {
    stage: 'crosssection',
    when: () => state.csMeasurements.length === 0 && state.stage === 'crosssection',
    targetSelector: '#cs-svg',
    label: 'Coach mark',
    body: 'You\'re looking <b>across</b> the channel now (side view). Click where the dashed line meets the bankfull tape — the rod measures bed depth. Repeat 11 times to map the channel shape.',
    arrow: 'top',
  },
  units_first: {
    stage: 'units',
    when: () => state.unitBoundaries.length === 2 && state.stage === 'units',
    targetSelector: '#unit-svg',
    label: 'Coach mark',
    body: '<b>Click the profile</b> wherever you see a habitat change — like a step into deeper water (pool) or coarser substrate (riffle). Add as many boundaries as you see distinct units, then classify each.',
    arrow: 'top',
  },
  substrate_choose: {
    stage: 'substrate',
    when: () => state.substrateCrossSections.length === 0 && state.stage === 'substrate',
    targetSelector: '#sub-svg',
    label: 'Coach mark',
    body: '<b>Click in riffles first</b> (the orange bands) — riffles get sampling priority because their substrate matters most for spawning fish. Place 6 cross-sections total.',
    arrow: 'top',
  },
  substrate_pick: {
    stage: 'substrate',
    when: () => state.substrateCrossSections.length === 6 && state.substratePicks.length === 0 && state.stage === 'substrate',
    targetSelector: '#sub-game',
    label: 'New step · particle picking',
    body: "Imagine reaching down without looking and picking up the first particle you feel. Match it to the gravelometer template on the right — pick the <b>smallest opening it doesn't fit through</b>.",
    arrow: 'right',
  },
  undercut_first: {
    stage: 'undercut',
    when: () => state.undercutDecisions.length === 0 && state.stage === 'undercut',
    targetSelector: '#uc-grid',
    label: 'Coach mark',
    body: 'Each card shows a candidate undercut. <b>Read the four criteria</b> (✓ = passes, ✗ = fails) and decide whether to <b>Record</b> it as habitat or <b>Skip</b> it. All four must pass to qualify.',
    arrow: 'top',
  },
};

function dismissCoach() {
  if (activeCoach) { activeCoach.remove(); activeCoach = null; }
  if (activeSpotlight) { activeSpotlight.remove(); activeSpotlight = null; }
}

function maybeShowCoach() {
  for (const [key, mark] of Object.entries(COACH_MARKS)) {
    if (seenCoachMarks.has(key)) continue;
    if (mark.stage !== state.stage) continue;
    if (!mark.when()) continue;
    showCoach(key, mark);
    return; // one at a time
  }
}

function showCoach(key, mark) {
  const target = document.querySelector(mark.targetSelector);
  if (!target) return;
  seenCoachMarks.add(key);
  const r = target.getBoundingClientRect();

  // Spotlight ring around the target (clamped to viewport)
  const sl = document.createElement('div');
  sl.className = 'coach-spotlight';
  const left = Math.max(8, r.left - 4);
  const top = Math.max(8, r.top - 4);
  const width = Math.min(window.innerWidth - 16, r.width + 8);
  const height = Math.min(window.innerHeight - 16, r.height + 8);
  sl.style.cssText = `left: ${left}px; top: ${top}px; width: ${width}px; height: ${height}px;`;
  document.body.appendChild(sl);
  activeSpotlight = sl;

  // Coach card
  const card = document.createElement('div');
  card.className = `coach arrow-${mark.arrow || 'top'}`;
  card.innerHTML = `
    <div class="coach-label">${mark.label}</div>
    <div class="coach-body">${mark.body}</div>
    <button class="coach-dismiss">Got it</button>
  `;
  document.body.appendChild(card);
  // Position the card relative to target
  const cardRect = card.getBoundingClientRect();
  let cardLeft, cardTop;
  switch (mark.arrow) {
    case 'left':
      cardLeft = r.right + 16;
      cardTop = r.top + r.height/2 - cardRect.height/2;
      break;
    case 'right':
      cardLeft = r.left - cardRect.width - 16;
      cardTop = r.top + r.height/2 - cardRect.height/2;
      break;
    case 'bottom':
      cardLeft = r.left + 20;
      cardTop = r.top - cardRect.height - 16;
      break;
    case 'top':
    default:
      cardLeft = r.left + 20;
      cardTop = r.bottom + 16;
      break;
  }
  // Clamp to viewport
  cardLeft = Math.max(12, Math.min(window.innerWidth - cardRect.width - 12, cardLeft));
  cardTop = Math.max(12, Math.min(window.innerHeight - cardRect.height - 12, cardTop));
  card.style.left = cardLeft + 'px';

  const onTargetClick = () => { dismissCoach(); target.removeEventListener('click', onTargetClick); };

  activeCoach = card;
}

// ---------- THE STREAM (synthetic but plausible) ----------
// We model a stream reach with a centerline that meanders, and bank lines.
// Lengths are in real meters. The "true" bankfull width varies along the reach.
const STREAM = (() => {
  // 110m reach, varying width 5-9m, sinuous
  const len = 110;
  const samples = [];
  for (let s = 0; s <= len; s += 0.5) {
    // centerline lateral offset: sum of two sines
    const lat = 6 * Math.sin(s * 0.06) + 2.5 * Math.sin(s * 0.16 + 1.2);
    // bankfull width (varies along channel realistically)
    const bfw = 7.0 + 1.5 * Math.sin(s * 0.05 + 0.4) + 0.8 * Math.sin(s * 0.18);
    samples.push({ s, lat, bfw });
  }
  return { len, samples };
})();

// True average bankfull at the bottom of site (first 5 widths spaced equally)
function trueBankfullAt(s) {
  // Linear interpolation
  const i = Math.min(STREAM.samples.length - 2, Math.max(0, Math.floor(s * 2)));
  const a = STREAM.samples[i], b = STREAM.samples[i+1];
  const t = (s - a.s) / (b.s - a.s);
  return a.bfw + (b.bfw - a.bfw) * t;
}
function centerlineAt(s) {
  const i = Math.min(STREAM.samples.length - 2, Math.max(0, Math.floor(s * 2)));
  const a = STREAM.samples[i], b = STREAM.samples[i+1];
  const t = (s - a.s) / (b.s - a.s);
  return a.lat + (b.lat - a.lat) * t;
}

function introIllustrationSVG() {
  // Build proper banks as smooth filled polygons (one path, no string-reversing tricks)
  const W = 460, H = 420;
  const padX = 30, padY = 0;
  const sToX = s => padX + s * (W - 2*padX) / STREAM.len;
  const latToY = lat => 200 + lat * 8;

  // Compute left and right bank polylines
  const leftBank = [], rightBank = [];
  for (let s = 0; s <= STREAM.len; s += 1) {
    const cy = latToY(centerlineAt(s));
    const w = trueBankfullAt(s) * 4;
    leftBank.push([sToX(s), cy - w * 0.55]);
    rightBank.push([sToX(s), cy + w * 0.55]);
  }
  // Bankfull polygon
  const bfPath = 'M ' + leftBank.map(p => p.join(' ')).join(' L ') +
                 ' L ' + rightBank.slice().reverse().map(p => p.join(' ')).join(' L ') + ' Z';
  // Wetted (narrower) polygon
  const wetLeft = leftBank.map(([x,y], i) => {
    const cy = latToY(centerlineAt((i)));
    return [x, y + (cy - y) * 0.42];
  });
  const wetRight = rightBank.map(([x,y], i) => {
    const cy = latToY(centerlineAt((i)));
    return [x, y + (cy - y) * 0.42];

  const wetPath = 'M ' + wetLeft.map(p => p.join(' ')).join(' L ') +
                  ' L ' + wetRight.slice().reverse().map(p => p.join(' ')).join(' L ') + ' Z';
  // Centerline (thalweg)
  const thalweg = leftBank.map((_, i) => `${sToX(i)} ${latToY(centerlineAt(i))}`).join(' L ');

  return `

    <!-- Thalweg dotted -->

// STAGE 1: SITE LAYOUT
// =====================================================================
// We let the user click 5 points along the stream where they think bankfull
// edges are, then "measure" perpendicular bankfull widths.
// Then they place transects at the calculated spacing.

function stageLayout() {
  const el = document.createElement('div');
  el.style.cssText = 'display: flex; flex-direction: column; gap: 24px;';

  el.appendChild(layoutSidebar());

function layoutCanvas() {
  const c = document.createElement('div');
  c.className = 'panel';
  c.style.cssText = 'padding: 18px;';

  const W = 1400, H = 600;
  const sToX = s => 60 + s * (W - 120) / STREAM.len;
  const latToY = lat => H/2 + lat * 12;

  // Smooth bank polygons
  const leftBank = [], rightBank = [], wetLeft = [], wetRight = [];
  for (let s = 0; s <= STREAM.len; s += 0.5) {
    const cy = latToY(centerlineAt(s));
    const wPx = trueBankfullAt(s) * 5.5;
    leftBank.push([sToX(s), cy - wPx * 0.5]);
    rightBank.push([sToX(s), cy + wPx * 0.5]);
    wetLeft.push([sToX(s), cy - wPx * 0.32]);
    wetRight.push([sToX(s), cy + wPx * 0.32]);
  }
  const bfPath = 'M ' + leftBank.map(p => p.join(' ')).join(' L ') +
                 ' L ' + rightBank.slice().reverse().map(p => p.join(' ')).join(' L ') + ' Z';
  const wetPath = 'M ' + wetLeft.map(p => p.join(' ')).join(' L ') +
                  ' L ' + wetRight.slice().reverse().map(p => p.join(' ')).join(' L ') + ' Z';

  // 5 measurement targets — equally spaced from BOS by avg-bankfull (we'll compute from "true")
  const trueBfwAtBOS = trueBankfullAt(0);
  const measurePositions = [0, 1, 2, 3, 4].map(i => i * trueBfwAtBOS); // s in meters

  const phase = state.bankfullMeasurements.length < 5 ? 'measuring' : (state.transectsLocked ? 'done' : 'transects');

  // Plot user's measurements
  let measureMarkers = '';
  state.bankfullMeasurements.forEach((m, i) => {
    const x = sToX(m.s);
    const y = latToY(centerlineAt(m.s));
    const wPx = m.value * 5.5;
    measureMarkers += `
      <line x1="${x}" y1="${y - wPx*0.5 - 12}" x2="${x}" y2="${y + wPx*0.5 + 12}" stroke="#b4471f" stroke-width="1.4" stroke-dasharray="3 2"/>
      <circle cx="${x}" cy="${y}" r="4" fill="#b4471f" stroke="#fdfaf0" stroke-width="1.2"/>
      <text x="${x+6}" y="${y - wPx*0.5 - 16}" font-family="Caveat" font-size="16" fill="#b4471f">#${i+1}: ${m.value.toFixed(1)}m</text>
    `;
  });

  // Next measurement preview (where to click)
  let preview = '';
  if (phase === 'measuring') {
    const i = state.bankfullMeasurements.length;
    const targetS = i === 0 ? 0 : measurePositions[i];
    const tx = sToX(targetS);
    const ty = latToY(centerlineAt(targetS));
    preview = `
      <circle cx="${tx}" cy="${ty}" r="14" fill="none" stroke="#b4471f" stroke-width="1.5" stroke-dasharray="2 3" opacity="0.5">
        <animate attributeName="r" values="14;22;14" dur="1.6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;0.15;0.6" dur="1.6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="${tx}" cy="${ty}" r="6" fill="none" stroke="#b4471f" stroke-width="1.5" opacity="0.85"/>
      <text x="${tx}" y="${ty - 24}" text-anchor="middle" font-family="Caveat" font-size="18" fill="#b4471f">tap here ↓</text>
    `;
  }

  // Transect positions if in transect phase
  let transectMarks = '';
  if (state.widthCategory != null) {
    const spacing = state.widthCategory; // in meters
    const nPlaced = state.transectsPlaced;
    for (let t = 0; t < 11; t++) {
      const s = t * spacing;
      if (s > STREAM.len) continue;
      const x = sToX(s);
      const y = latToY(centerlineAt(s));
      const w = trueBankfullAt(s) * 5.5;
      const placed = t < nPlaced;
      const next = t === nPlaced && phase === 'transects';
      const color = placed ? '#4a7d3d' : (next ? '#b4471f' : '#8a7e60');
      const opacity = placed ? 1 : (next ? 0.9 : 0.3);
      transectMarks += `
        <g opacity="${opacity}">
          <line x1="${x}" y1="${y - w*0.55 - 14}" x2="${x}" y2="${y + w*0.55 + 14}"
                stroke="${color}" stroke-width="${placed ? 2.5 : 1.4}" ${placed ? '' : 'stroke-dasharray="2 2"'}/>
          ${placed ? `<circle cx="${x}" cy="${y - w*0.55 - 14}" r="3" fill="${color}"/>
                      <circle cx="${x}" cy="${y + w*0.55 + 14}" r="3" fill="${color}"/>` : ''}
          <text x="${x}" y="${y - w*0.55 - 18}" text-anchor="middle" font-family="JetBrains Mono" font-size="10" fill="${color}" font-weight="600">T${t+1}</text>
          ${next ? `<text x="${x}" y="${y + w*0.55 + 28}" text-anchor="middle" font-family="Caveat" font-size="16" fill="${color}">click to place →</text>` : ''}
        </g>
      `;
    }
  }

  c.innerHTML = `
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 12px; flex-wrap: wrap;">
      <h3 class="display" style="margin: 0; font-size: 22px;">Site Layout · top-down view</h3>
      <div style="display: flex; gap: 10px; align-items: center;">
        ${whyButton('layout')}
        <span class="tag" style="color: var(--rust);">stage 01</span>
      </div>
    </div>
    <svg viewBox="0 0 ${W} ${H}" style="width: 100%; height: auto; background: linear-gradient(180deg, #e8d9b4, #d4c094); border: 1.5px solid var(--ink); cursor: ${phase === 'done' ? 'default' : 'crosshair'};" id="layout-svg">
      <defs>
        <pattern id="grass-pat-2" width="8" height="8" patternUnits="userSpaceOnUse">
          <path d="M 1 7 L 1 2 M 4 7 L 4 3 M 6 7 L 6 1" stroke="#6b7d4a" stroke-width="0.5" opacity="0.4"/>
        </pattern>
        <linearGradient id="lay-bf" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#a8c0d0"/>
          <stop offset="100%" stop-color="#7a96a8"/>
        </linearGradient>
        <linearGradient id="lay-wet" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#5a7e90"/>
          <stop offset="100%" stop-color="#2c4654"/>
        </linearGradient>
      </defs>
      <rect width="100%" height="100%" fill="url(#grass-pat-2)" opacity="0.55"/>
      <!-- Bankfull -->
      <path d="${bfPath}" fill="url(#lay-bf)" opacity="0.75"/>
      <!-- Wetted -->
      <path d="${wetPath}" fill="url(#lay-wet)" opacity="0.9"/>
      <!-- Subtle ripple highlights along the wetted channel -->
      ${(() => {
        let r = '';
        for (let s = 2; s < STREAM.len; s += 6) {
          const x = sToX(s);
          const y = latToY(centerlineAt(s));
          const w = trueBankfullAt(s) * 5.5;
          r += `<path d="M ${x-w*0.2} ${y - w*0.1} Q ${x} ${y - w*0.18} ${x+w*0.2} ${y - w*0.1}" stroke="#fdfaf0" stroke-width="0.5" fill="none" opacity="0.4"/>`;
        }
        return r;
      })()}
      <!-- BOS marker -->
      <g transform="translate(${sToX(0)},${latToY(centerlineAt(0))})">
        <circle r="11" fill="#fdfaf0" stroke="#2a2418" stroke-width="1.5"/>
        <circle r="3" fill="#2a2418"/>
        <text y="-18" text-anchor="middle" font-family="JetBrains Mono" font-size="10" font-weight="700">BOS</text>
      </g>
      ${measureMarkers}
      ${preview}
      ${transectMarks}
      <!-- Scale -->
      <g transform="translate(60, ${H - 30})">
        <line x1="0" y1="0" x2="${10 * (W-120)/STREAM.len}" y2="0" stroke="#2a2418" stroke-width="1.5"/>
        <line x1="0" y1="-3" x2="0" y2="3" stroke="#2a2418" stroke-width="1.5"/>
        <line x1="${10 * (W-120)/STREAM.len}" y1="-3" x2="${10 * (W-120)/STREAM.len}" y2="3" stroke="#2a2418" stroke-width="1.5"/>
        <text x="${5 * (W-120)/STREAM.len}" y="-6" text-anchor="middle" font-family="JetBrains Mono" font-size="10" fill="#5a4f38">10 m</text>
      </g>
      <!-- Compass / flow -->
      <text x="${W-50}" y="30" font-family="Caveat" font-size="22" fill="#b4471f">flow →</text>
    </svg>
    <div id="layout-help" style="margin-top: 14px; min-height: 60px;"></div>
  `;

  // Wire up clicks
  setTimeout(() => {
    const svg = c.querySelector('#layout-svg');
    svg.addEventListener('click', (e) => {
      if (phase === 'done') return;
      const rect = svg.getBoundingClientRect();
      const xPx = (e.clientX - rect.left) / rect.width * W;
      const yPx = (e.clientY - rect.top) / rect.height * H;
      const s = (xPx - 40) / (W - 80) * STREAM.len;
      if (s < 0 || s > STREAM.len) return;
      const expectedY = latToY(centerlineAt(s));
      // Allow a click within a generous lateral range (close to channel)
      if (Math.abs(yPx - expectedY) > 60) {
        toast('Click <i>on</i> the stream channel.', 'bad', 2200); return;
      }
      if (phase === 'measuring') {
        const i = state.bankfullMeasurements.length;
        const expected = i === 0 ? 0 : measurePositions[i];
        // Tolerance: within 0.6 * BFW
        if (Math.abs(s - expected) > Math.max(1.5, trueBfwAtBOS * 0.6)) {
          toast(`Try closer to the recommended spacing — protocol says space them <b>1 BFW apart</b>.`, 'bad', 3500);
          return;
        }
        // measurement value is the true bankfull at that point + small noise (user error)
        const noise = (Math.random() - 0.5) * 0.4;
        const value = +(trueBankfullAt(s) + noise).toFixed(1);
        state.bankfullMeasurements.push({ s, value });
        addRipple(svg, e.clientX, e.clientY);
        sfx.waterDrop();
        if (state.bankfullMeasurements.length === 5) {
          // Calculate average → width category
          const avg = state.bankfullMeasurements.reduce((a,b)=>a+b.value,0) / 5;
          state.widthCategory = computeWidthCategory(avg);
          // scoring
          const trueAvg = STREAM.samples.slice(0, Math.ceil(trueBfwAtBOS*8)).reduce((a,b)=>a+b.bfw,0) / Math.ceil(trueBfwAtBOS*8);
          if (Math.abs(avg - trueAvg) < 0.5) state.scoreNotes.layout.push('Bankfull widths well-measured.');
          state.score.layout += 50;
          sfx.stageComplete();
          toast(`Average BFW = <b>${avg.toFixed(2)} m</b> → site width category <b>${state.widthCategory} m</b>`, 'ok', 4500);
        }
        render();
      } else if (phase === 'transects') {
        const t = state.transectsPlaced;
        const expected = t * state.widthCategory;
        if (Math.abs(s - expected) > state.widthCategory * 0.35) {
          toast(`Transect ${t+1} should be <b>${state.widthCategory} m</b> from the previous one. Tap closer to the highlighted line.`, 'bad', 3500);
          return;
        }
        state.transectsPlaced++;
        addRipple(svg, e.clientX, e.clientY);
        sfx.pinSet();
        if (state.transectsPlaced >= 11) {
          state.transectsLocked = true;
          state.score.layout += 50;
          state.scoreNotes.layout.push('All 11 transects placed at correct spacing.');
          sfx.stageComplete();
          toast(`<b>Site complete.</b> 11 transects, ${(10 * state.widthCategory)} m total reach.`, 'ok', 5000);
        }
        render();
      }
    });

    // Help text
    const help = c.querySelector('#layout-help');
    if (phase === 'measuring') {
      const i = state.bankfullMeasurements.length;
      help.innerHTML = `
        <div style="display: flex; gap: 14px; align-items: flex-start;">
          <div class="hand" style="font-size: 36px; color: var(--rust); line-height: 1;">${i+1}/5</div>
          <div style="font-size: 14px; color: var(--ink-soft); line-height: 1.5;">
            <b>Click on the stream</b> at the pulsing red ring to measure how wide the channel is here. We're measuring <b>bankfull width</b> — the width of the channel when water just fills the banks.
            ${i === 0 ? `Start at the <b>bottom of the site</b> — the marked "BOS" circle.` : `Move <b>upstream</b> by about one stream-width from your last measurement.`}
            <br/><span style="color: var(--ink-faint); font-style: italic;">In real fieldwork you'd find bankfull by looking for slope breaks, vegetation lines, and stain marks. Your measurement here includes a bit of simulated field error.</span>
          </div>
        </div>`;
    } else if (phase === 'transects') {
      help.innerHTML = `
        <div style="display: flex; gap: 14px; align-items: flex-start;">
          <div class="hand" style="font-size: 36px; color: var(--rust); line-height: 1;">${state.transectsPlaced+1}/11</div>
          <div style="font-size: 14px; color: var(--ink-soft); line-height: 1.5;">
            Place <b>transect ${state.transectsPlaced+1}</b> — a sampling line across the channel — about ${state.widthCategory}&nbsp;m upstream from the last one. Click anywhere near the red dashed line.
            <br/><span style="color: var(--ink-faint); font-style: italic;">Tip: distances are <b>straight line</b>, not following the curves of the stream.</span>
          </div>
        </div>`;
    } else {
      help.innerHTML = `
        <div style="border-left: 3px solid var(--green-ok); padding: 12px 16px; background: rgba(74,125,61,0.08); display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap;">
          <div>
            <b>Site established.</b> Reach length: <span class="mono">${(10 * state.widthCategory)} m</span> · Width category: <span class="mono">${state.widthCategory} m</span>
            <br/><span style="font-size: 13px; color: var(--ink-soft);">In the field, you'd now mark the bottom and top of the site (rebar or a tagged tree) so you can find it again next year.</span>
          </div>
          <button class="btn btn-primary" onclick="goStage('crosssection')">Continue →</button>
        </div>`;
    }
  }, 0);

  return c;
}

function addRipple(svg, clientX, clientY) {
  const r = svg.getBoundingClientRect();
  const W = +svg.getAttribute('viewBox').split(' ')[2];
  const H = +svg.getAttribute('viewBox').split(' ')[3];
  const cx = (clientX - r.left) / r.width * W;
  const cy = (clientY - r.top) / r.height * H;
  const ns = 'http://www.w3.org/2000/svg';
  const c1 = document.createElementNS(ns, 'circle');
  c1.setAttribute('cx', cx); c1.setAttribute('cy', cy); c1.setAttribute('r', '0');
  c1.setAttribute('fill', 'none'); c1.setAttribute('stroke', '#b4471f'); c1.setAttribute('stroke-width', '2');
  c1.classList.add('ripple');
  svg.appendChild(c1);
  setTimeout(() => c1.remove(), 800);
}

function computeWidthCategory(avg) {
  if (avg <= 6) return 6;
  if (avg <= 8) return 8;
  if (avg <= 10) return 10;
  if (avg <= 12) return 12;
  if (avg <= 14) return 14;
  if (avg <= 16) return 16;
  if (avg <= 18) return 18;
  return 20;
}

// =====================================================================
// STAGE 2: CROSS SECTIONS
// =====================================================================
// User chooses transect, then drops the depth rod at 11 horizontal points
// across the bankfull channel.

// Generate a synthetic bed profile per transect
function bedProfile(transect) {
  // Returns function(x_norm in [0,1]) → bankfull_depth (m), and water_surface_y (m)
  const bfw = trueBankfullAt((transect-1) * (state.widthCategory || 6));
  // Asymmetric U-shape with thalweg slightly off-center
  const thalwegX = 0.45 + 0.1 * Math.sin(transect * 1.7);
  const maxDepth = 0.7 + 0.4 * Math.abs(Math.sin(transect * 0.9));
  // Wetted width is some fraction of bankfull
  const wettedFrac = 0.55 + 0.1 * Math.cos(transect);
  const wetLeft = thalwegX - wettedFrac/2;
  const wetRight = thalwegX + wettedFrac/2;
  // Water surface depth from bankfull (i.e., bankfull depth at water surface ~ shallow)
  const waterDepthFromBankfull = maxDepth * 0.3; // water surface is 30% down the bank
  return {
    bfw,
    bedDepth(xn) {
      // smooth U-shape
      const d = Math.exp(-Math.pow((xn - thalwegX) / 0.32, 2)) * maxDepth;
      // tiny perturbation
      return d + 0.04 * Math.sin(xn * 18 + transect);
    },
    waterDepthFromBankfull,
    wetLeft, wetRight,
    isWet(xn) { return xn >= wetLeft && xn <= wetRight; },
    wettedDepth(xn) {
      if (!this.isWet(xn)) return 0;
      const bd = this.bedDepth(xn);
      const wd = bd - waterDepthFromBankfull;
      return Math.max(0, wd);
    }
  };
}

function stageCrossSection() {
  const el = document.createElement('div');
  el.style.cssText = 'display: flex; flex-direction: column; gap: 24px;';
  el.appendChild(crossSectionCanvas());
  el.appendChild(crossSectionSidebar());
  return el;
}

function crossSectionCanvas() {
  const c = document.createElement('div');
  c.className = 'panel';
  c.style.cssText = 'padding: 18px;';

  // Pick which transect we're on - cross sections are at every odd transect
  const oddTransects = [1, 3, 5, 7, 9, 11];
  const ti = state.csTransect;

  const profile = bedProfile(ti);
  const W = 1200, H = 560;
  const padX = 100, padY = 80;
  const xnToPx = xn => padX + xn * (W - 2*padX);
  const depthToY = d => padY + d * 280;  // 1m = 280px (was 200)

  // Draw the cross section
  // The bankfull width is normalized to [0,1] for drawing; underneath we
  // know the real bankfull width.
  const bfw = profile.bfw;
  // 11 sample positions
  const interval = bfw / 10;
  const samplePoints = [];
  for (let i = 0; i < 11; i++) samplePoints.push(i * interval);

  // Place rod ghost at next un-measured point
  const next = state.csMeasurements.length;
  const nextXm = next < 11 ? samplePoints[next] : null;

  // build bed path
  let bedPath = `M ${xnToPx(0)} ${depthToY(0)} `;
  for (let xn = 0; xn <= 1; xn += 0.005) {
    bedPath += `L ${xnToPx(xn)} ${depthToY(profile.bedDepth(xn))} `;
  }

  // water surface line
  const waterY = depthToY(profile.waterDepthFromBankfull);

  // Existing measurements display
  let rodMarks = '';
  state.csMeasurements.forEach((m, i) => {
    const xn = m.x_real / bfw;
    const x = xnToPx(xn);
    rodMarks += `
      <g>
        <line x1="${x}" y1="${depthToY(0) - 24}" x2="${x}" y2="${depthToY(m.bf_depth)}"
              stroke="${'#b4471f'}" stroke-width="2"/>
        <rect x="${x-3}" y="${depthToY(0) - 26}" width="6" height="4" fill="${'#b4471f'}"/>
        <text x="${x}" y="${depthToY(0) - 32}" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="${'#2a2418'}">${i+1}</text>
        <text x="${x}" y="${depthToY(m.bf_depth) + 14}" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="${'#b4471f'}">${m.bf_depth.toFixed(2)}</text>
      </g>
    `;
  });

  // Next measurement guide
  let preview = '';
  if (nextXm != null) {
    const xn = nextXm / bfw;
    const x = xnToPx(xn);
    preview = `
      <line x1="${x}" y1="${padY - 30}" x2="${x}" y2="${depthToY(profile.bedDepth(xn))}"
            stroke="${'#2a2418'}" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>
      <text x="${x}" y="${padY - 38}" text-anchor="middle" font-family="Caveat" font-size="18" fill="${'#b4471f'}">drop here</text>
      <polygon points="${x-5},${padY - 25} ${x+5},${padY - 25} ${x},${padY - 18}" fill="${'#b4471f'}"/>
    `;
  }

  // Bank labels
  const lbBank = `
    <text x="${xnToPx(0)}" y="${padY - 12}" text-anchor="middle" font-family="JetBrains Mono" font-size="11" font-weight="600" fill="${'#2a2418'}">LEFT BANK</text>
    <text x="${xnToPx(1)}" y="${padY - 12}" text-anchor="middle" font-family="JetBrains Mono" font-size="11" font-weight="600" fill="${'#2a2418'}">RIGHT BANK</text>
  `;

  // Bankfull tape line
  const tapeY = padY - 6;
  const tapeMarks = (() => {
    let m = '';
    for (let i = 0; i <= 10; i++) {
      const x = padX + i * (W - 2*padX) / 10;
      m += `<line x1="${x}" y1="${tapeY-3}" x2="${x}" y2="${tapeY+3}" stroke="${'#2a2418'}"/>`;
    }
    return m;
  })();

  c.innerHTML = `
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 12px;">
      <h3 class="display" style="margin: 0; font-size: 22px;">
        Channel Cross Section · transect <span style="color: var(--rust);">${ti}</span>
      </h3>
      <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
        ${whyButton('crosssection')}
        <div style="display: flex; gap: 6px; align-items: center;">
          ${oddTransects.map(t => `
            <button class="btn ${t === ti ? 'btn-primary' : ''}"
                    style="padding: 4px 10px; font-size: 11px; box-shadow: ${t === ti ? '2px 2px 0 var(--ink)' : 'none'};"
                    onclick="window.__pickCSTransect(${t})">T${t}</button>
          `).join('')}
        </div>
      </div>
    </div>
    <svg viewBox="0 0 ${W} ${H}" style="width: 100%; background: linear-gradient(180deg, #f0e8d6, #e0d4b0); border: 1.5px solid var(--ink);" id="cs-svg">
      <!-- earth/bank area below bed -->
      <path d="${bedPath} L ${xnToPx(1)} ${H - padY/2} L ${xnToPx(0)} ${H - padY/2} Z"
            fill="${'#a89070'}" opacity="0.55"/>
      <path d="${bedPath} L ${xnToPx(1)} ${H - padY/2} L ${xnToPx(0)} ${H - padY/2} Z"
            fill="url(#bank-pat)" opacity="0.5"/>
      <defs>
        <pattern id="bank-pat" width="6" height="6" patternUnits="userSpaceOnUse">
          <circle cx="2" cy="2" r="0.5" fill="${'#5a4f38'}" opacity="0.6"/>
          <circle cx="4" cy="4" r="0.4" fill="${'#5a4f38'}" opacity="0.5"/>
        </pattern>
        <linearGradient id="water-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${'#8aa3b5'}" stop-opacity="0.85"/>
          <stop offset="100%" stop-color="${'#2c4654'}" stop-opacity="0.95"/>
        </linearGradient>
      </defs>

      <!-- water -->
      ${(() => {
        const wl = profile.wetLeft, wr = profile.wetRight;
        let wp = `M ${xnToPx(wl)} ${waterY} `;
        wp += `L ${xnToPx(wr)} ${waterY} `;
        for (let xn = wr; xn >= wl; xn -= 0.005) {
          const d = profile.bedDepth(xn);
          if (d > profile.waterDepthFromBankfull) {
            wp += `L ${xnToPx(xn)} ${depthToY(d)} `;
          }
        }
        wp += 'Z';
        return `<path d="${wp}" fill="url(#water-grad)"/>`;
      })()}

      <!-- water surface ripples -->
      <path d="${(() => {
        const wl = profile.wetLeft, wr = profile.wetRight;
        let p = `M ${xnToPx(wl)} ${waterY} `;
        for (let xn = wl; xn <= wr; xn += 0.02) {
          p += `L ${xnToPx(xn)} ${waterY + 0.6 * Math.sin(xn * 30 + Date.now()/600)} `;
        }
        return p;
      })()}" fill="none" stroke="${'#fdfaf0'}" stroke-width="0.6" opacity="0.7"/>

      <!-- Bankfull tape line -->
      <line x1="${padX}" y1="${tapeY}" x2="${W - padX}" y2="${tapeY}" stroke="${'#2a2418'}" stroke-width="1.5"/>
      ${tapeMarks}
      <text x="${padX - 8}" y="${tapeY + 4}" text-anchor="end" font-family="JetBrains Mono" font-size="10" fill="${'#2a2418'}">0 m</text>
      <text x="${W - padX + 8}" y="${tapeY + 4}" font-family="JetBrains Mono" font-size="10" fill="${'#2a2418'}">${bfw.toFixed(1)} m</text>
      <text x="${W/2}" y="${padY - 22}" text-anchor="middle" font-family="JetBrains Mono" font-size="11" font-weight="600" fill="${'#2a2418'}" letter-spacing="0.15em">BANKFULL TAPE</text>

      ${lbBank}

      <!-- Bed line itself -->
      <path d="${bedPath}" fill="none" stroke="${'#5a4f38'}" stroke-width="1.5"/>

      <!-- Water depth indicator (dashed) -->
      <line x1="${padX}" y1="${waterY}" x2="${W-padX}" y2="${waterY}" stroke="${'#4a6878'}" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.6"/>
      <text x="${W-padX+8}" y="${waterY+4}" font-family="Caveat" font-size="14" fill="${'#4a6878'}">water</text>

      ${rodMarks}
      ${preview}
    </svg>
    <div id="cs-help" style="margin-top: 14px;"></div>
  `;

  setTimeout(() => {
    window.__pickCSTransect = (t) => {
      if (t !== state.csTransect) {
        // Save current measurements before switching? For simplicity, restart.
        if (state.csMeasurements.length > 0 && state.csMeasurements.length < 11) {
          if (!confirm('Switching transects will discard current measurements. Continue?')) return;
        }
        state.csTransect = t;
        state.csMeasurements = [];
        render();
      }
    };

    const svg = c.querySelector('#cs-svg');
    svg.style.cursor = state.csMeasurements.length < 11 ? 'crosshair' : 'default';
    svg.addEventListener('click', (e) => {
      if (state.csMeasurements.length >= 11) return;
      const rect = svg.getBoundingClientRect();
      const xPx = (e.clientX - rect.left) / rect.width * W;
      const next = state.csMeasurements.length;
      const expectedXn = samplePoints[next] / bfw;
      const expectedPx = xnToPx(expectedXn);
      // Tolerance: 30px
      if (Math.abs(xPx - expectedPx) > 30) {
        toast(`Aim for the highlighted spot (sample ${next+1} of 11).`, 'bad', 2200);
        return;
      }
      const xn = (xPx - padX) / (W - 2*padX);
      const x_real = xn * bfw;
      const bf_depth = profile.bedDepth(xn);
      const w_depth = profile.wettedDepth(xn);
      // Add small noise to simulate field error
      const measured_bf = +(bf_depth + (Math.random()-0.5) * 0.04).toFixed(2);
      const measured_w = w_depth > 0 ? +(w_depth + (Math.random()-0.5) * 0.03).toFixed(2) : 0;
      state.csMeasurements.push({
        x_real: +x_real.toFixed(2),
        bf_depth: Math.max(0, measured_bf),
        w_depth: Math.max(0, measured_w),
      });
      addRipple(svg, e.clientX, e.clientY);
      sfx.depthRod(measured_bf);
      if (state.csMeasurements.length === 11) {
        state.csComplete = true;
        state.score.crosssection += 50;
        state.scoreNotes.crosssection.push(`Cross section complete at transect ${ti}.`);
        // Compute mean depth, area for fun
        const meanD = state.csMeasurements.reduce((a,b)=>a+b.bf_depth,0)/11;
        // Count close-to-truth measurements
        const close = state.csMeasurements.filter((m, i) => {
          const xn = m.x_real / bfw;
          const truth = profile.bedDepth(xn);
          return Math.abs(m.bf_depth - truth) < 0.08;
        }).length;
        sfx.stageComplete();
        toast(`<b>Cross section logged.</b> Mean BF depth = ${meanD.toFixed(2)} m · ${close}/11 within field tolerance`, 'ok', 4500);
      }
      render();
    });

    const help = c.querySelector('#cs-help');
    if (state.csMeasurements.length < 11) {
      help.innerHTML = `
        <div style="display: flex; gap: 14px; align-items: flex-start;">
          <div class="hand" style="font-size: 36px; color: var(--rust); line-height: 1;">${state.csMeasurements.length+1}/11</div>
          <div style="font-size: 14px; color: var(--ink-soft); line-height: 1.5;">
            <b>Drop the depth rod</b> at the highlighted spot. The interval is bankfull width (${bfw.toFixed(1)}&nbsp;m) ÷ 10.
            Both <b>bankfull depth</b> (top of tape to bed) and <b>wetted depth</b> (water surface to bed) are recorded.
            ${state.csMeasurements.length === 0 ? `<br/><span style="font-style: italic; color: var(--ink-faint);">First measurement is at 0 m — bankfull depth is 0 here by definition (you're at the bank top).</span>` : ''}
          </div>
        </div>`;
    } else {
      const meanD = state.csMeasurements.reduce((a,b)=>a+b.bf_depth,0)/11;
      const wetMeasures = state.csMeasurements.filter(m => m.w_depth > 0);
      const wettedW = profile.wetRight - profile.wetLeft;
      // Compute per-point accuracy
      const close = state.csMeasurements.filter((m, i) => {
        const xn = m.x_real / bfw;
        const truth = profile.bedDepth(xn);
        return Math.abs(m.bf_depth - truth) < 0.08;
      }).length;
      // Calculate cross-sectional area (trapezoidal)
      let area = 0;
      for (let i = 0; i < state.csMeasurements.length - 1; i++) {
        const dx = state.csMeasurements[i+1].x_real - state.csMeasurements[i].x_real;
        area += dx * (state.csMeasurements[i].bf_depth + state.csMeasurements[i+1].bf_depth) / 2;
      }
      help.innerHTML = `
        <div style="border-left: 3px solid var(--green-ok); padding: 14px 18px; background: rgba(74,125,61,0.08);">
          <div style="display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap;">
            <div style="display: flex; gap: 24px; flex-wrap: wrap; font-size: 13px;">
              <div><b style="font-family: 'JetBrains Mono'; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-soft);">Mean BF depth</b><br/><span class="mono" style="font-size: 16px;">${meanD.toFixed(2)} m</span></div>
              <div><b style="font-family: 'JetBrains Mono'; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-soft);">Wetted W</b><br/><span class="mono" style="font-size: 16px;">${(wettedW * bfw).toFixed(1)} m</span></div>
              <div><b style="font-family: 'JetBrains Mono'; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-soft);">XS area</b><br/><span class="mono" style="font-size: 16px;">${area.toFixed(2)} m²</span></div>
              <div><b style="font-family: 'JetBrains Mono'; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-soft);">Accuracy</b><br/><span class="mono" style="font-size: 16px; color: ${close >= 9 ? 'var(--green-ok)' : close >= 6 ? 'var(--gold)' : 'var(--red-bad)'};">${close}/11</span></div>
            </div>
            <button class="btn btn-primary" onclick="goStage('units')">Continue →</button>
          </div>
          <div style="margin-top: 10px; font-size: 12px; color: var(--ink-soft); font-style: italic;">
            ${close >= 9 ? '✓ Solid measurements — you\'d trust this cross section.' : close >= 6 ? 'Mixed — some depths drifted from truth. Keep the rod vertical and tap the bed firmly.' : 'A lot of drift — common causes: tilted rod, soft bed (rod sinks), or reading the wrong tape mark.'}
          </div>
        </div>`;
    }
  }, 0);

  return c;
}
