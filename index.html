// =====================================================================
// STAGE 3: CHANNEL UNITS
// =====================================================================
// User identifies pool / riffle / run boundaries on a longitudinal profile

const TRUE_UNITS = [
  { start: 0,    end: 0.10, type: 'riffle' },
  { start: 0.10, end: 0.22, type: 'run' },
  { start: 0.22, end: 0.32, type: 'pool' },
  { start: 0.32, end: 0.42, type: 'riffle' },
  { start: 0.42, end: 0.55, type: 'run' },
  { start: 0.55, end: 0.65, type: 'pool' },
  { start: 0.65, end: 0.78, type: 'riffle' },
  { start: 0.78, end: 0.88, type: 'run' },
  { start: 0.88, end: 1.0,  type: 'riffle' },
];
const UNIT_COLORS = { pool: '#4a6878', riffle: '#c46943', run: '#8aa66e' };
const UNIT_INFO = {
  pool: { name: 'Pool', desc: 'Low gradient, smooth flow, lateral & longitudinal concavity, deeper.' },
  riffle: { name: 'Riffle', desc: 'Moderate-to-steep gradient, coarse substrate, turbulent flow, shallow.' },
  run: { name: 'Run', desc: 'Low gradient, smooth laminar flow, uniform depth, no concavity.' },
};

function stageUnits() {
  const el = document.createElement('div');
  el.style.cssText = 'display: grid; grid-template-columns: 1fr; gap: 24px;';

  const W = 1400, H = 460;
  const padX = 80, padY = 60;
  const sToX = sn => padX + sn * (W - 2*padX);

  // =====================================================================
  // Bed and water shape: pools dip below baseline, riffles bump above it,
  // runs stay flat.
  // =====================================================================
  function bedAt(sn) {
    let z = sn * 0.55;  // overall slope downstream
    for (const u of TRUE_UNITS) {
      if (sn >= u.start && sn <= u.end) {
        const t = (sn - u.start) / (u.end - u.start);
        if (u.type === 'pool')   z += -0.22 * Math.sin(t * Math.PI);
        if (u.type === 'riffle') z +=  0.16 * Math.sin(t * Math.PI) + 0.04 * Math.sin(t * Math.PI * 5);
        // runs stay smooth
      }
    }
    return z;
  }
  // Water surface: gentle drop overall, tiny ripples in riffles
  function waterAt(sn) {
    let z = sn * 0.45 - 0.05;
    for (const u of TRUE_UNITS) {
      if (sn >= u.start && sn <= u.end && u.type === 'riffle') {
        const t = (sn - u.start) / (u.end - u.start);
        z += 0.012 * Math.sin(t * Math.PI * 12);  // tiny chop
      }
    }
    return z;
  }
  // Find which unit a position is in (truth, used for substrate/effects)
  function unitAt(sn) {
    return TRUE_UNITS.find(u => sn >= u.start && sn <= u.end);
  }

  // Build view
  const c = document.createElement('div');
  c.className = 'panel';
  c.style.cssText = 'padding: 18px;';

  // ===== Path generation =====
  const yFor = z => padY + z * 280;
  // Bed line (just the line)
  let bedLineD = `M ${sToX(0)} ${yFor(bedAt(0))} `;
  for (let sn = 0; sn <= 1; sn += 0.003) bedLineD += `L ${sToX(sn)} ${yFor(bedAt(sn))} `;
  // Earth fill (bed line down to bottom)
  const earthD = bedLineD + ` L ${sToX(1)} ${H} L ${sToX(0)} ${H} Z`;
  // Water polygon (water surface to bed, between)
  let waterD = `M ${sToX(0)} ${yFor(waterAt(0))} `;
  for (let sn = 0; sn <= 1; sn += 0.003) waterD += `L ${sToX(sn)} ${yFor(Math.min(waterAt(sn), bedAt(sn)))} `;
  for (let sn = 1; sn >= 0; sn -= 0.003) waterD += `L ${sToX(sn)} ${yFor(bedAt(sn))} `;
  waterD += 'Z';
  // Water surface line
  let waterSurfD = `M ${sToX(0)} ${yFor(waterAt(0))} `;
  for (let sn = 0; sn <= 1; sn += 0.003) waterSurfD += `L ${sToX(sn)} ${yFor(Math.min(waterAt(sn), bedAt(sn)))} `;

  // ===== Substrate visualization (cobbles in/near riffles, hints in runs, none in pools) =====
  // Deterministic pseudo-random so the layout is stable across renders
  function pseudoRand(seed) {
    let x = Math.sin(seed * 12.9898) * 43758.5453;
    return x - Math.floor(x);
  }
  let substrateRocks = '';
  for (let i = 0; i < 220; i++) {
    const sn = i / 220 + (pseudoRand(i) - 0.5) * 0.005;
    if (sn < 0 || sn > 1) continue;
    const u = unitAt(sn);
    if (!u || u.type === 'pool') continue;  // pools hide substrate
    const x = sToX(sn);
    const bedY = yFor(bedAt(sn));
    const waterY = yFor(waterAt(sn));
    const r1 = pseudoRand(i * 7.1 + 3);
    const r2 = pseudoRand(i * 11.3 + 5);
    const r3 = pseudoRand(i * 5.7 + 9);
    if (u.type === 'riffle') {
      // Riffle: many cobbles/boulders, some breaking water surface
      // Skip if past unit boundary
      if (Math.random() > 0.92) continue;
      const size = 4 + r1 * 9; // larger
      // Place near bed but vary upward — some breach the surface
      const breach = r2 < 0.4;
      const y = breach
        ? waterY - r3 * 4 - size * 0.4
        : (waterY + (bedY - waterY) * (0.45 + r2 * 0.55)) - size * 0.3;
      const shade = 0.45 + r3 * 0.4;
      const fill = `rgb(${Math.round(120*shade)}, ${Math.round(95*shade)}, ${Math.round(60*shade)})`;
      substrateRocks += `<ellipse cx="${x}" cy="${y}" rx="${size}" ry="${size*0.78}" fill="${fill}" stroke="#2a2418" stroke-width="0.6" opacity="0.92"/>`;
      // Small highlight
      substrateRocks += `<ellipse cx="${x - size*0.25}" cy="${y - size*0.3}" rx="${size*0.4}" ry="${size*0.25}" fill="#fdfaf0" opacity="0.18"/>`;
    } else if (u.type === 'run') {
      // Runs: small pebbles visible through clear water near bed
      if (r1 > 0.5) continue;
      const size = 1.4 + r2 * 2.6;
      const y = bedY - r3 * 6 - size;
      substrateRocks += `<circle cx="${x}" cy="${y}" r="${size}" fill="rgb(120, 100, 70)" opacity="${0.35 + r1*0.25}"/>`;
    }
  }

  // ===== Surface texture (white water, ripples, glass) =====
  let surfaceFx = '';
  // Riffle white water — small foam patches concentrated near substrate breaches
  for (let i = 0; i < 180; i++) {
    const sn = i / 180;
    const u = unitAt(sn);
    if (!u || u.type !== 'riffle') continue;
    const r1 = pseudoRand(i * 3.7 + 1.1);
    const r2 = pseudoRand(i * 9.3 + 2.7);
    if (r1 > 0.6) continue;
    const x = sToX(sn) + (r2 - 0.5) * 12;
    const y = yFor(waterAt(sn)) + (r1 - 0.5) * 4;
    const w = 6 + r1 * 8;
    surfaceFx += `<ellipse cx="${x}" cy="${y}" rx="${w}" ry="${1.2 + r2 * 1.5}" fill="#fdfaf0" opacity="${0.55 + r1*0.3}"/>`;
  }
  // Run flow lines — gentle horizontal streaks
  for (let i = 0; i < 60; i++) {
    const sn = i / 60;
    const u = unitAt(sn);
    if (!u || u.type !== 'run') continue;
    const r1 = pseudoRand(i * 4.1 + 8);
    const r2 = pseudoRand(i * 6.7 + 12);
    if (r1 > 0.55) continue;
    const x = sToX(sn);
    const y = yFor(waterAt(sn)) + 6 + r1 * 12;
    const len = 8 + r2 * 14;
    surfaceFx += `<path d="M ${x} ${y} q ${len/2} ${-1.5} ${len} 0" stroke="#fdfaf0" stroke-width="0.8" fill="none" opacity="${0.25 + r1*0.2}"/>`;
  }
  // Pool: glassy reflections (horizontal bands of slightly lighter water)
  for (let i = 0; i < 40; i++) {
    const sn = i / 40 + 0.012;
    const u = unitAt(sn);
    if (!u || u.type !== 'pool') continue;
    const r1 = pseudoRand(i * 2.3 + 17);
    const r2 = pseudoRand(i * 8.1 + 23);
    if (r1 > 0.5) continue;
    const x = sToX(sn);
    const y = yFor(waterAt(sn)) + 4 + r1 * 6;
    const len = 18 + r2 * 28;
    surfaceFx += `<line x1="${x}" y1="${y}" x2="${x + len}" y2="${y}" stroke="#fdfaf0" stroke-width="0.6" opacity="${0.18 + r1*0.18}"/>`;
  }

  // ===== Pool depth tint — darker water in pool zones =====
  let poolTint = '';
  TRUE_UNITS.forEach((u, idx) => {
    if (u.type !== 'pool') return;
    const x1 = sToX(u.start), x2 = sToX(u.end);
    // Find the deepest point in this pool
    let deepestY = padY, deepestSn = u.start;
    for (let sn = u.start; sn <= u.end; sn += 0.005) {
      const y = yFor(bedAt(sn));
      if (y > deepestY) { deepestY = y; deepestSn = sn; }
    }
    const cx = sToX(deepestSn);
    const wsY = yFor(waterAt(deepestSn));
    poolTint += `<radialGradient id="pool-tint-${idx}" cx="${(cx-x1)/(x2-x1)}" cy="0.7"><stop offset="0%" stop-color="#0d2230" stop-opacity="0.55"/><stop offset="100%" stop-color="#0d2230" stop-opacity="0"/></radialGradient>`;
  });

  // user boundaries
  const boundaries = state.unitBoundaries;
  const segments = [];
  for (let i = 0; i < boundaries.length - 1; i++) {
    segments.push({ start: boundaries[i], end: boundaries[i+1], type: state.unitClassifications[i] || null });
  }

  // segment classification bar at top
  let segmentBands = '';
  segments.forEach((seg, i) => {
    const x1 = sToX(seg.start), x2 = sToX(seg.end);
    const color = seg.type ? UNIT_COLORS[seg.type] : '#bbb';
    segmentBands += `
      <rect x="${x1}" y="${padY - 28}" width="${x2-x1}" height="18" fill="${color}" opacity="0.85" stroke="#2a2418" stroke-width="1"/>
      <text x="${(x1+x2)/2}" y="${padY - 14}" text-anchor="middle" font-family="JetBrains Mono" font-size="10" font-weight="700" fill="#fdfaf0" letter-spacing="0.06em">${seg.type ? seg.type.toUpperCase() : 'u'+(i+1)}</text>
    `;
  });

  // boundary markers
  let boundaryMarks = '';
  boundaries.forEach((b, i) => {
    if (i === 0 || i === boundaries.length - 1) return;
    const x = sToX(b);
    boundaryMarks += `
      <line x1="${x}" y1="${padY - 32}" x2="${x}" y2="${H - 10}" stroke="#b4471f" stroke-width="1.4" stroke-dasharray="3 2"/>
      <circle cx="${x}" cy="${padY - 36}" r="7" fill="#b4471f" stroke="#fdfaf0" stroke-width="2"
              style="cursor: pointer;" data-boundary="${i}" class="boundary-handle"/>
      <text x="${x}" y="${padY - 33}" text-anchor="middle" font-family="JetBrains Mono" font-size="9" font-weight="700" fill="#fdfaf0" pointer-events="none">×</text>
    `;
  });

  c.innerHTML = `
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 12px; flex-wrap: wrap;">
      <h3 class="display" style="margin: 0; font-size: 22px;">Channel Units · side view of the stream</h3>
      <div style="display: flex; gap: 10px; align-items: center;">
        ${whyButton('units')}
        <span class="tag" style="color: var(--rust);">stage 03</span>
      </div>
    </div>
    <svg viewBox="0 0 ${W} ${H}" style="width: 100%; background: linear-gradient(180deg, #e8d9b4 0%, #d4c094 70%, #b89c64 100%); border: 1.5px solid var(--ink); cursor: ${state.unitsComplete ? 'default' : 'crosshair'};" id="unit-svg">
      <defs>
        <pattern id="bank-pat" width="6" height="6" patternUnits="userSpaceOnUse">
          <circle cx="2" cy="2" r="0.6" fill="#5a4f38" opacity="0.45"/>
          <circle cx="4" cy="4" r="0.5" fill="#5a4f38" opacity="0.35"/>
        </pattern>
        <pattern id="grass-tip" width="14" height="6" patternUnits="userSpaceOnUse">
          <path d="M 2 6 L 2 1 M 6 6 L 6 2 M 10 6 L 10 0" stroke="#6b7d4a" stroke-width="0.7" opacity="0.7"/>
        </pattern>
        <linearGradient id="water-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#7ea0b3"/>
          <stop offset="50%" stop-color="#4a6878"/>
          <stop offset="100%" stop-color="#1a2c38"/>
        </linearGradient>
        <linearGradient id="sky-tint" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#cbd9e0" stop-opacity="0.35"/>
          <stop offset="100%" stop-color="#cbd9e0" stop-opacity="0"/>
        </linearGradient>
        ${poolTint}
      </defs>

      <!-- Sky / above-water atmosphere -->
      <rect x="0" y="0" width="${W}" height="${padY}" fill="url(#sky-tint)"/>

      <!-- Grass/bank texture above water -->
      <rect x="0" y="${padY - 6}" width="${W}" height="6" fill="url(#grass-tip)" opacity="0.6"/>

      <!-- Earth (bed and below) -->
      <path d="${earthD}" fill="#a89070"/>
      <path d="${earthD}" fill="url(#bank-pat)" opacity="0.5"/>

      <!-- Water (full polygon) -->
      <path d="${waterD}" fill="url(#water-grad)" opacity="0.92"/>

      <!-- Pool deep tints (overlaid radial darker patches in pools) -->
      ${TRUE_UNITS.map((u, idx) => {
        if (u.type !== 'pool') return '';
        const x1 = sToX(u.start), x2 = sToX(u.end);
        const top = yFor(waterAt((u.start+u.end)/2));
        const bottom = Math.max(yFor(bedAt((u.start+u.end)/2)), top + 60);
        return `<ellipse cx="${(x1+x2)/2}" cy="${(top+bottom)/2 + 8}" rx="${(x2-x1)/2}" ry="${(bottom-top)/2}" fill="url(#pool-tint-${idx})"/>`;
      }).join('')}

      <!-- Substrate (cobbles & pebbles) -->
      ${substrateRocks}

      <!-- Surface effects (white water, ripples, glass reflections) -->
      ${surfaceFx}

      <!-- Bed line -->
      <path d="${bedLineD}" fill="none" stroke="#5a4f38" stroke-width="1.6"/>

      <!-- Water surface line -->
      <path d="${waterSurfD}" fill="none" stroke="#fdfaf0" stroke-width="0.9" opacity="0.85"/>

      <!-- Diagnostic icons floating above each TRUE unit (subtle hints, not labels) -->
      ${TRUE_UNITS.map(u => {
        const cx = sToX((u.start + u.end) / 2);
        const yIco = padY - 44;
        if (u.type === 'pool') {
          return `<g transform="translate(${cx}, ${yIco})" opacity="0.28">
            <path d="M -10 0 Q 0 8 10 0" fill="none" stroke="#2a2418" stroke-width="1.2"/>
            <path d="M -7 -3 Q 0 4 7 -3" fill="none" stroke="#2a2418" stroke-width="1"/>
          </g>`;
        }
        if (u.type === 'riffle') {
          return `<g transform="translate(${cx}, ${yIco})" opacity="0.28">
            <path d="M -10 2 L -6 -3 L -2 2 L 2 -3 L 6 2 L 10 -3" fill="none" stroke="#2a2418" stroke-width="1.4"/>
          </g>`;
        }
        if (u.type === 'run') {
          return `<g transform="translate(${cx}, ${yIco})" opacity="0.28">
            <line x1="-10" y1="-1" x2="10" y2="-1" stroke="#2a2418" stroke-width="1.2"/>
            <line x1="-10" y1="2" x2="10" y2="2" stroke="#2a2418" stroke-width="1.2"/>
          </g>`;
        }
        return '';
      }).join('')}

      <!-- Segment classification bar -->
      ${segmentBands}
      <!-- Boundary handles -->
      ${boundaryMarks}

      <!-- BOS / TOS labels -->
      <text x="${sToX(0)}" y="${H - 10}" text-anchor="start" font-family="JetBrains Mono" font-size="11" font-weight="700">BOS →</text>
      <text x="${sToX(1)}" y="${H - 10}" text-anchor="end" font-family="JetBrains Mono" font-size="11" font-weight="700">→ TOS</text>
      <text x="${W/2}" y="22" text-anchor="middle" font-family="Caveat" font-size="22" fill="#b4471f">flow direction →</text>
    </svg>
    <div style="margin-top: 14px; display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-start;">
      <div style="flex: 2; min-width: 280px;">
        <h5 style="margin: 0 0 8px; font-size: 13px; font-family: 'JetBrains Mono'; text-transform: uppercase; letter-spacing: 0.1em;">Step 1: Click the stream to mark unit boundaries</h5>
        <p style="margin: 0; font-size: 13px; color: var(--ink-soft); line-height: 1.5;">
          Look for visual changes: <b style="color: var(--pool);">pools</b> are <b>deep, dark, glassy</b>; <b style="color: var(--riffle);">riffles</b> are <b>shallow with cobbles and white water</b>; <b style="color: var(--run);">runs</b> are <b>smooth and uniform</b> with subtle flow lines. Click a boundary marker (red ✕) to remove it. Aim for <b>${TRUE_UNITS.length}</b> distinct units.
        </p>
      </div>
      <div style="flex: 1; min-width: 200px; display: flex; gap: 6px; flex-wrap: wrap;">
        <button class="btn btn-ghost" style="font-size: 10px; padding: 6px 10px;" onclick="window.__resetBoundaries()">↺ Reset</button>
        <button class="btn" style="font-size: 10px; padding: 6px 10px;" onclick="window.__autoBoundaries()">≈ Suggest</button>
      </div>
    </div>

    <div id="unit-classify" style="margin-top: 22px;"></div>
  `;

  // classifier panel
  setTimeout(() => {
    const svg = c.querySelector('#unit-svg');
    svg.addEventListener('click', (e) => {
      if (state.unitsComplete) return;
      // Don't add boundary if user clicked an existing handle
      if (e.target.classList.contains('boundary-handle')) return;
      const rect = svg.getBoundingClientRect();
      const xPx = (e.clientX - rect.left) / rect.width * W;
      const sn = (xPx - padX) / (W - 2*padX);
      if (sn < 0.04 || sn > 0.96) return;
      // Ensure not too close to existing
      if (state.unitBoundaries.some(b => Math.abs(b - sn) < 0.04)) {
        toast('Too close to an existing boundary.', 'bad', 1800); return;
      }
      state.unitBoundaries.push(sn);
      state.unitBoundaries.sort((a,b) => a - b);
      // keep classifications synced
      state.unitClassifications = (state.unitBoundaries.length - 1 > state.unitClassifications.length)
        ? [...state.unitClassifications, null]
        : state.unitClassifications.slice(0, state.unitBoundaries.length - 1);
      addRipple(svg, e.clientX, e.clientY);
      sfx.chime();
      render();
    });
    // Boundary handle clicks → remove
    svg.querySelectorAll('.boundary-handle').forEach(h => {
      h.addEventListener('click', (e) => {
        e.stopPropagation();
        const i = +h.dataset.boundary;
        state.unitBoundaries.splice(i, 1);
        state.unitClassifications.splice(i-1, 1); // remove the classification corresponding to merged segments
        render();
      });
    });

    window.__resetBoundaries = () => {
      state.unitBoundaries = [0, 1];
      state.unitClassifications = [];
      render();
    };
    window.__autoBoundaries = () => {
      // Place boundaries at the true unit boundaries
      state.unitBoundaries = [0, ...TRUE_UNITS.slice(0, -1).map(u => u.end), 1];
      state.unitClassifications = TRUE_UNITS.map(u => null);
      render();
      toast('Auto-placed boundaries at true breaks (you still classify them).', 'info', 3500);
    };

    const cf = c.querySelector('#unit-classify');
    if (segments.length > 0) {
      cf.innerHTML = `
        <h5 style="margin: 0 0 12px; font-size: 13px; font-family: 'JetBrains Mono'; text-transform: uppercase; letter-spacing: 0.1em;">Step 2: Classify each unit</h5>
        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px;">
          ${segments.map((seg, i) => {
            const cls = state.unitClassifications[i];
            return `
            <div style="border: 1.5px solid ${cls ? UNIT_COLORS[cls] : 'var(--ink-faint)'}; padding: 10px 12px; background: ${cls ? UNIT_COLORS[cls] + '20' : 'rgba(255,250,240,0.5)'};">
              <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                <span style="font-family: 'JetBrains Mono'; font-weight: 600; font-size: 12px;">u${i+1}</span>
                <span style="font-family: 'JetBrains Mono'; font-size: 10px; color: var(--ink-faint);">${(seg.start*100).toFixed(0)}–${(seg.end*100).toFixed(0)}%</span>
              </div>
              <div style="display: flex; gap: 4px;">
                ${['pool','riffle','run'].map(t => `
                  <button onclick="window.__classify(${i}, '${t}')"
                          style="flex:1; border: 1px solid ${UNIT_COLORS[t]}; background: ${cls === t ? UNIT_COLORS[t] : 'transparent'}; color: ${cls === t ? '#fdfaf0' : UNIT_COLORS[t]}; font-family: 'JetBrains Mono'; font-size: 10px; padding: 5px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.05em;">
                    ${t[0].toUpperCase()+t.slice(1,4)}
                  </button>
                `).join('')}
              </div>
            </div>
            `;
          }).join('')}
        </div>
        <div style="margin-top: 18px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
          <button class="btn btn-primary" ${state.unitClassifications.some(c => !c) ? 'disabled' : ''} onclick="window.__finishUnits()">Score units →</button>
          ${state.unitsComplete ? `<button class="btn btn-primary" onclick="goStage('substrate')">Continue to Substrate →</button>` : ''}
        </div>
      `;
    }
    window.__classify = (i, t) => { state.unitClassifications[i] = t; sfx.toggle(); render(); };
    window.__finishUnits = () => {
      // Compare to TRUE_UNITS
      let correct = 0, total = state.unitClassifications.length;
      const wrongUnits = [];
      state.unitClassifications.forEach((cls, i) => {
        const seg = segments[i];
        const mid = (seg.start + seg.end) / 2;
        const trueU = TRUE_UNITS.find(u => mid >= u.start && mid <= u.end);
        if (trueU && trueU.type === cls) correct++;
        else if (trueU) wrongUnits.push({ idx: i+1, said: cls, actual: trueU.type });
      });
      const pct = (correct / total) * 100;
      state.unitsComplete = true;
      state.unitsWrong = wrongUnits;
      state.score.units = Math.round(pct);
      state.scoreNotes.units.push(`${correct}/${total} units classified correctly (${pct.toFixed(0)}%).`);
      const boundaryDelta = Math.abs(state.unitBoundaries.length - 1 - TRUE_UNITS.length);
      if (boundaryDelta === 0) state.scoreNotes.units.push('Correct number of channel units identified.');
      else state.scoreNotes.units.push(`Identified ${state.unitBoundaries.length - 1} units; ${TRUE_UNITS.length} are present.`);
      if (pct >= 70) sfx.stageComplete(); else sfx.notify();
      toast(`<b>${correct}/${total} units classified correctly</b> (${pct.toFixed(0)}%)`, pct >= 70 ? 'ok' : 'info', 5000);
      render();
    };
  }, 0);

  el.appendChild(c);

  // Misclassification breakdown (if scored)
  if (state.unitsComplete && state.unitsWrong && state.unitsWrong.length > 0) {
    const fb = document.createElement('div');
    fb.className = 'panel';
    fb.style.cssText = 'padding: 22px; border-left: 4px solid var(--rust);';
    fb.innerHTML = `
      <h4 class="display" style="margin: 0 0 10px; font-size: 18px;">Where you missed</h4>
      <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px;">
        ${state.unitsWrong.map(w => {
          const hints = {
            pool: 'Pools are concave both laterally and longitudinally — the bed dips below the surrounding profile and the water surface is glassy.',
            riffle: 'Riffles sit on topographic <b>highs</b> with steeper gradient (>1%), coarse cobbles/boulders, and turbulent surface.',
            run: 'Runs are smooth and uniform — low gradient like a pool, but no concavity. Travel-corridor habitat.',
          };
          return `<div style="border: 1px solid var(--ink-faint); padding: 10px 14px;">
            <div style="font-family: 'JetBrains Mono'; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px;">u${w.idx}</div>
            <div style="font-size: 13px; line-height: 1.5;">You said <b style="color: ${UNIT_COLORS[w.said]}">${w.said}</b>, actually <b style="color: ${UNIT_COLORS[w.actual]}">${w.actual}</b>.</div>
            <div style="font-size: 12px; color: var(--ink-soft); margin-top: 6px; font-style: italic;">${hints[w.actual]}</div>
          </div>`;
        }).join('')}
      </div>
    `;
    el.appendChild(fb);
  }

  // unit info panel — now with mini stream illustrations for each type
  const info = document.createElement('div');
  info.className = 'panel';
  info.style.cssText = 'padding: 22px;';

  // Mini stream illustration generator for each unit type
  function unitMini(type) {
    const mw = 240, mh = 90;
    let bedPath, waterPath, contents = '';
    if (type === 'pool') {
      // Concave bed dipping down
      bedPath = `M 0 30 L 30 35 Q 120 75 210 35 L 240 30`;
      waterPath = `M 0 25 L 240 25 L 240 30 L 210 35 Q 120 75 30 35 L 0 30 Z`;
      // Glassy reflection lines
      for (let i = 0; i < 5; i++) {
        const y = 35 + i * 6, x = 40 + (i % 3) * 60, len = 25 + (i*7) % 30;
        contents += `<line x1="${x}" y1="${y}" x2="${x+len}" y2="${y}" stroke="#fdfaf0" stroke-width="0.6" opacity="0.3"/>`;
      }
      // Pool deep tint
      contents += `<ellipse cx="120" cy="55" rx="80" ry="20" fill="#0d2230" opacity="0.45"/>`;
    } else if (type === 'riffle') {
      // Convex bed bumping up — water shallow
      bedPath = `M 0 50 L 30 48 Q 120 30 210 48 L 240 50`;
      waterPath = `M 0 28 L 240 28 L 240 50 L 210 48 Q 120 30 30 48 L 0 50 Z`;
      // Visible cobbles
      const rocks = [[40, 38, 5], [70, 33, 6], [105, 30, 7], [140, 31, 6.5], [175, 35, 5.5], [205, 40, 5]];
      rocks.forEach(([x, y, r]) => {
        contents += `<ellipse cx="${x}" cy="${y}" rx="${r}" ry="${r*0.8}" fill="rgb(80, 60, 40)" stroke="#2a2418" stroke-width="0.5"/>`;
        contents += `<ellipse cx="${x-r*0.3}" cy="${y-r*0.4}" rx="${r*0.4}" ry="${r*0.2}" fill="#fdfaf0" opacity="0.2"/>`;
      });
      // White water foam
      [[55, 30], [90, 28], [125, 27], [160, 28], [195, 30]].forEach(([x, y]) => {
        contents += `<ellipse cx="${x}" cy="${y}" rx="8" ry="1.5" fill="#fdfaf0" opacity="0.8"/>`;
      });
    } else { // run
      // Flat bed, smooth water
      bedPath = `M 0 55 L 240 55`;
      waterPath = `M 0 26 L 240 26 L 240 55 L 0 55 Z`;
      // Gentle directional flow lines
      for (let i = 0; i < 8; i++) {
        const x = 20 + i * 28, y = 33 + (i % 3) * 8;
        contents += `<path d="M ${x} ${y} q 6 -1 12 0" stroke="#fdfaf0" stroke-width="0.7" fill="none" opacity="0.35"/>`;
      }
      // A few small pebbles near bed
      [[40, 50], [85, 51], [130, 50], [175, 51], [215, 49]].forEach(([x, y]) => {
        contents += `<circle cx="${x}" cy="${y}" r="1.6" fill="rgb(120, 100, 70)" opacity="0.55"/>`;
      });
    }

    return `<svg viewBox="0 0 ${mw} ${mh}" style="width: 100%; background: linear-gradient(180deg, #e8d9b4, #d4c094); border: 1px solid var(--ink); display: block;">
      <defs>
        <linearGradient id="mini-water-${type}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${type === 'pool' ? '#5a7e90' : type === 'riffle' ? '#a8c4d0' : '#7ea0b3'}"/>
          <stop offset="100%" stop-color="${type === 'pool' ? '#1a2c38' : type === 'riffle' ? '#5a7e90' : '#3a5868'}"/>
        </linearGradient>
      </defs>
      <!-- Earth below bed -->
      <path d="${bedPath} L 240 90 L 0 90 Z" fill="#a89070"/>
      <!-- Water -->
      <path d="${waterPath}" fill="url(#mini-water-${type})" opacity="0.9"/>
      ${contents}
      <!-- Bed line -->
      <path d="${bedPath}" fill="none" stroke="#5a4f38" stroke-width="1.2"/>
    </svg>`;
  }

  const diagnostics = {
    pool: ['Deep, dark water', 'Glassy, smooth surface', 'Bed dips down (concave)', 'Substrate hidden by depth'],
    riffle: ['Shallow, light-colored water', 'White water / foam', 'Cobbles visible at/near surface', 'Bed bumps up (convex)'],
    run: ['Medium depth, uniform', 'Smooth surface, gentle flow', 'Pebbles barely visible', 'Bed is flat'],
  };

  info.innerHTML = `
    <h4 class="display" style="margin: 0 0 6px; font-size: 18px;">Unit reference · what to look for</h4>
    <p style="margin: 0 0 16px; font-size: 13px; color: var(--ink-soft); font-style: italic;">Compare these patterns to the stream above.</p>
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px;">
      ${['pool','riffle','run'].map(t => `
        <div style="border: 1.5px solid ${UNIT_COLORS[t]}; background: ${UNIT_COLORS[t]}12;">
          <div style="display: flex; justify-content: space-between; align-items: baseline; padding: 8px 14px; background: ${UNIT_COLORS[t]}; color: #fdfaf0;">
            <h5 class="display" style="margin: 0; font-size: 18px;">${UNIT_INFO[t].name}</h5>
            <span style="font-family: 'JetBrains Mono'; font-size: 10px; opacity: 0.85;">${t === 'riffle' ? 'gradient > 1%' : 'gradient < 1%'}</span>
          </div>
          ${unitMini(t)}
          <div style="padding: 10px 14px;">
            <ul style="margin: 0 0 10px; padding: 0; list-style: none; font-size: 12px; line-height: 1.6;">
              ${diagnostics[t].map(d => `<li style="display: flex; gap: 6px; padding: 1px 0;"><span style="color: ${UNIT_COLORS[t]}; font-weight: 700;">▸</span><span>${d}</span></li>`).join('')}
            </ul>
            <p style="margin: 0; font-size: 12px; line-height: 1.5; color: var(--ink-soft); font-style: italic; padding-top: 8px; border-top: 1px dotted var(--ink-faint);">${UNIT_INFO[t].desc}</p>
          </div>
        </div>
      `).join('')}
    </div>
    <div style="margin-top: 14px; padding: 12px 14px; background: rgba(192,138,42,0.08); border-left: 3px solid var(--gold); font-size: 13px; line-height: 1.5;">
      <b style="color: var(--gold); text-transform: uppercase; font-size: 11px; font-family: 'JetBrains Mono'; letter-spacing: 0.1em;">Quick tip</b>
      Channel units organize the reach into habitats fish use differently. Riffles oxygenate water and support invertebrates; pools provide cover and slow-water rest; runs are travel corridors. Many subsequent measurements (substrate, undercuts) tie back to the unit they fall in.
    </div>
  `;
  el.appendChild(info);

  return el;
}

// =====================================================================
// STAGE 4: SUBSTRATE
// =====================================================================
// Step 1: Place 6 cross-sections, prioritizing riffles
// Step 2: At each cross-section, "blind-pick" 11 particles, classify b-axis
// Step 3: Cobble embeddedness for cobble-class particles

const SIZE_CLASSES = [
  { label: 'fines', max: 2, color: '#8a7e60' },
  { label: 'sand', max: 2, color: '#c08a2a' },
  { label: '4', max: 4, color: '#b8a070' },
  { label: '8', max: 8, color: '#a89060' },
  { label: '16', max: 16, color: '#988050' },
  { label: '32', max: 32, color: '#887040' },
  { label: '64', max: 64, color: '#786030' },
  { label: '90', max: 90, color: '#685828' },
  { label: '128', max: 128, color: '#585020' },
  { label: '180', max: 180, color: '#484818' },
  { label: '>180', max: 999, color: '#383812' },
  { label: 'bedrock', max: 9999, color: '#2a2418' },
];

function stageSubstrate() {
  const el = document.createElement('div');
  el.className = 'fadein';

  // Compute riffles in user's classification
  const segments = [];
  for (let i = 0; i < state.unitBoundaries.length - 1; i++) {
    segments.push({
      start: state.unitBoundaries[i],
      end: state.unitBoundaries[i+1],
      type: state.unitClassifications[i] || null,
      idx: i + 1,
    });
  }
  const riffles = segments.filter(s => s.type === 'riffle');
  // Use TRUE_UNITS as fallback if user skipped/erred
  const trueRiffles = TRUE_UNITS.map((u, i) => ({...u, idx: i+1})).filter(u => u.type === 'riffle');
  const useRiffles = riffles.length > 0 ? riffles : trueRiffles;

  // Phase: choose cross-sections, then sample particles
  const phase = state.substrateCrossSections.length < 6 ? 'choose' : 'sample';

  if (phase === 'choose') {
    el.appendChild(substrateChoosePanel(segments, useRiffles));
  } else {
    el.appendChild(substrateSamplePanel());
  }
  return el;
}

function substrateChoosePanel(segments, riffles) {
  const c = document.createElement('div');
  c.className = 'panel';
  c.style.cssText = 'padding: 22px;';

  const W = 1400, H = 130;
  const padX = 80;
  const sToX = sn => padX + sn * (W - 2*padX);

  // Build profile-like band
  let segBands = '';
  segments.forEach(seg => {
    const color = seg.type ? UNIT_COLORS[seg.type] : '#aaa';
    segBands += `
      <rect x="${sToX(seg.start)}" y="20" width="${sToX(seg.end)-sToX(seg.start)}" height="50"
            fill="${color}" opacity="0.65" stroke="${'#2a2418'}" stroke-width="1"/>
      <text x="${sToX((seg.start+seg.end)/2)}" y="48" text-anchor="middle" font-family="JetBrains Mono" font-size="11" font-weight="600" fill="${'#fdfaf0'}">u${seg.idx}</text>
      <text x="${sToX((seg.start+seg.end)/2)}" y="78" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="${'#2a2418'}">${seg.type ? seg.type : '—'}</text>
    `;
  });

  // Show user's chosen cross-sections as flags
  state.substrateCrossSections.forEach((cs, i) => {
    const x = sToX(cs.position);
    segBands += `
      <line x1="${x}" y1="14" x2="${x}" y2="74" stroke="${'#b4471f'}" stroke-width="2"/>
      <polygon points="${x},14 ${x+10},10 ${x+10},20" fill="${'#b4471f'}"/>
      <text x="${x}" y="98" text-anchor="middle" font-family="JetBrains Mono" font-size="10" fill="${'#b4471f'}" font-weight="600">CS${i+1}</text>
    `;
  });

  // Suggest button: smartly distribute 6 across riffles (or top up with runs)
  c.innerHTML = `
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 12px; flex-wrap: wrap;">
      <h3 class="display" style="margin: 0; font-size: 22px;">Substrate · cross-section placement</h3>
      <div style="display: flex; gap: 10px; align-items: center;">
        ${whyButton('substrate')}
        <span class="tag" style="color: var(--rust);">stage 04 — step 1/2</span>
      </div>
    </div>
    <p style="font-size: 14px; color: var(--ink-soft); line-height: 1.6; max-width: 700px; margin: 0 0 16px;">
      Place <b>6 cross-sections</b> for substrate sampling. <b>Riffles get priority</b>: if there are ≥6 riffles, one per riffle. With fewer riffles, distribute extras proportional to riffle length (then add runs if needed). Don't put two cross-sections closer than 2 m.
    </p>
    <svg viewBox="0 0 ${W} ${H}" style="width: 100%; background: linear-gradient(180deg, #f0e8d6, #e0d4b0); border: 1.5px solid var(--ink); cursor: ${state.substrateCrossSections.length < 6 ? 'crosshair' : 'default'};" id="sub-svg">
      ${segBands}
      <text x="${sToX(0)}" y="14" text-anchor="start" font-family="JetBrains Mono" font-size="9">BOS</text>
      <text x="${sToX(1)}" y="14" text-anchor="end" font-family="JetBrains Mono" font-size="9">TOS</text>
    </svg>
    <div style="margin-top: 16px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center;">
      <button class="btn btn-ghost" style="font-size: 10px; padding: 6px 10px;" onclick="window.__resetCS()">↺ Reset cross-sections</button>
      <button class="btn" style="font-size: 10px; padding: 6px 10px;" onclick="window.__suggestCS()">≈ Suggest placement</button>
      <span style="margin-left: auto; font-size: 13px; color: var(--ink-soft);">${state.substrateCrossSections.length}/6 placed</span>
    </div>
    <div id="sub-help" style="margin-top: 14px;"></div>
  `;

  setTimeout(() => {
    const svg = c.querySelector('#sub-svg');
    svg.addEventListener('click', (e) => {
      if (state.substrateCrossSections.length >= 6) return;
      const rect = svg.getBoundingClientRect();
      const xPx = (e.clientX - rect.left) / rect.width * W;
      const sn = (xPx - padX) / (W - 2*padX);
      if (sn < 0.01 || sn > 0.99) return;
      // Min spacing: 2m mapped to ratio. Reach length ≈ 10 * widthCategory.
      const reachM = 10 * (state.widthCategory || 6);
      const minSep = 2 / reachM;
      if (state.substrateCrossSections.some(cs => Math.abs(cs.position - sn) < minSep)) {
        toast('Cross-sections must be ≥ 2 m apart.', 'bad', 2200); return;
      }
      // Find which segment this is in
      const seg = segments.find(s => sn >= s.start && sn <= s.end);
      state.substrateCrossSections.push({ position: sn, unitType: seg?.type, unitIdx: seg?.idx });
      addRipple(svg, e.clientX, e.clientY);
      sfx.pinSet();
      render();
    });
    window.__resetCS = () => { state.substrateCrossSections = []; state.substratePicks = []; render(); };
    window.__suggestCS = () => {
      // Use TRUE_UNITS as the canonical reference for placement
      const trueRiffles = TRUE_UNITS.map((u, i) => ({...u, idx: i+1})).filter(u => u.type === 'riffle');
      const totalRiffleLen = trueRiffles.reduce((a,b) => a + (b.end - b.start), 0);
      const placements = [];
      if (trueRiffles.length >= 6) {
        // 1 per riffle, midpoint
        for (let i = 0; i < 6; i++) {
          const r = trueRiffles[i];
          placements.push({ position: (r.start + r.end) / 2, unitType: 'riffle', unitIdx: r.idx });
        }
      } else {
        // distribute proportionally to riffle length
        let assigned = 0;
        const need = 6;
        const counts = trueRiffles.map(r => Math.max(1, Math.round(need * (r.end - r.start) / totalRiffleLen)));
        // adjust to total exactly need
        let sum = counts.reduce((a,b)=>a+b,0);
        while (sum > need) { counts[counts.indexOf(Math.max(...counts))]--; sum--; }
        while (sum < need) { counts[counts.indexOf(Math.min(...counts))]++; sum++; }
        trueRiffles.forEach((r, i) => {
          const k = counts[i];
          for (let j = 0; j < k; j++) {
            const t = (j + 1) / (k + 1);
            placements.push({ position: r.start + t * (r.end - r.start), unitType: 'riffle', unitIdx: r.idx });
          }
        });
      }
      state.substrateCrossSections = placements.slice(0, 6);
      render();
      toast(`Suggested placement: ${state.substrateCrossSections.length} cross-sections distributed across riffles.`, 'info', 4000);
    };

    // Help panel
    const help = c.querySelector('#sub-help');
    if (state.substrateCrossSections.length === 6) {
      // Score
      const inRiffle = state.substrateCrossSections.filter(cs => cs.unitType === 'riffle').length;
      help.innerHTML = `
        <div style="border-left: 3px solid var(--green-ok); padding: 12px 16px; background: rgba(74,125,61,0.08);">
          <b>Cross-sections placed.</b> ${inRiffle}/6 in riffles. Each one will get 5 particle picks.
          <button class="btn btn-primary" style="margin-left: 16px;" onclick="window.__startSampling()">Begin particle sampling →</button>
        </div>
      `;
      window.__startSampling = () => {
        // Move on to sample phase
        // We just trigger a re-render — phase auto-advances when length === 6 AND user clicks button
        // Simplest: stash a flag
        state._samplingStarted = true;
        render();
      };
    }
  }, 0);
  return c;
}

function substrateSamplePanel() {
  const c = document.createElement('div');
  c.className = 'panel';
  c.style.cssText = 'padding: 22px;';

  const PICKS_PER_CS = 5; // reduced from 11 for pacing; concept is identical

  // Determine current cross-section: first one that has < PICKS_PER_CS picks
  const csIdx = state.substrateCrossSections.findIndex((cs, i) => {
    const picks = state.substratePicks.filter(p => p.cs === i);
    return picks.length < PICKS_PER_CS;
  });

  const allDone = csIdx === -1;
  const currentCS = !allDone ? state.substrateCrossSections[csIdx] : null;
  const currentPicks = !allDone ? state.substratePicks.filter(p => p.cs === csIdx) : [];

  if (allDone) {
    // Compute D50 etc.
    const allSizes = state.substratePicks.map(p => p.size_class);
    const counts = {};
    SIZE_CLASSES.forEach(sc => counts[sc.label] = 0);
    allSizes.forEach(s => counts[s] = (counts[s] || 0) + 1);
    const meanFinesPct = (() => {
      const cobblePicks = state.substratePicks.filter(p => p.embeddedness != null);
      if (!cobblePicks.length) return null;
      return cobblePicks.reduce((a,b) => a + b.embeddedness, 0) / cobblePicks.length;
    })();

    state.substrateComplete = true;
    state.score.substrate = 100;
    if (!state._substrateFinalSoundPlayed) {
      sfx.stageComplete();
      state._substrateFinalSoundPlayed = true;
    }
    if (meanFinesPct != null) state.scoreNotes.substrate.push(`Mean cobble embeddedness: ${meanFinesPct.toFixed(1)}%`);
    state.scoreNotes.substrate.push(`${state.substratePicks.length} particles measured across ${state.substrateCrossSections.length} cross-sections.`);

    // Histogram
    let bars = '';
    const maxCount = Math.max(...Object.values(counts));
    SIZE_CLASSES.forEach((sc, i) => {
      const ct = counts[sc.label];
      const h = maxCount > 0 ? (ct / maxCount) * 120 : 0;
      bars += `
        <div style="display: flex; flex-direction: column; align-items: center; flex: 1;">

            <div style="width: 70%; height: ${h}px; background: ${sc.color}; border: 1px solid var(--ink); display: flex; align-items: flex-start; justify-content: center; padding-top: 2px; color: ${sc.label === 'fines' || sc.label === 'sand' || sc.label === '4' || sc.label === '8' ? 'var(--ink)' : 'var(--paper)'}; font-family: 'JetBrains Mono'; font-size: 9px; font-weight: 600;">${ct > 0 ? ct : ''}</div>
          </div>

        </div>
      `;
    });

    c.innerHTML = `
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
        <h3 class="display" style="margin: 0; font-size: 22px;">Substrate · summary</h3>
        <span class="tag" style="color: var(--rust);">stage 04 — complete</span>
      </div>
      <p style="font-size: 14px; color: var(--ink-soft); line-height: 1.5;">${state.substratePicks.length} particles measured across 6 cross-sections. Particle size distribution:</p>
      <div style="display: flex; gap: 4px; align-items: flex-end; padding: 10px 0 36px; border-bottom: 1.5px solid var(--ink);">
        ${bars}
      </div>
      ${meanFinesPct != null ? `
      <div style="margin-top: 18px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px;">
        <div style="border-left: 4px solid var(--rust); padding: 10px 14px; background: rgba(180,71,31,0.06);">
          <div style="font-family: 'JetBrains Mono'; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--rust);">Mean cobble embeddedness</div>
          <div class="display" style="font-size: 32px; margin-top: 4px;">${meanFinesPct.toFixed(1)}%</div>
        </div>
        <div style="border-left: 4px solid var(--gold); padding: 10px 14px; background: rgba(192,138,42,0.06);">
          <div style="font-family: 'JetBrains Mono'; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gold);">Note</div>
          <div style="font-size: 13px; line-height: 1.5; margin-top: 4px;">High embeddedness = fine sediment filling cobble interstices = poor for fish/insects. ${meanFinesPct > 30 ? 'This site shows elevated fine-sediment loading.' : 'This site has reasonable interstitial space.'}</div>
        </div>
      </div>
      ` : ''}
      <div style="margin-top: 22px; text-align: right;">
        <button class="btn btn-primary" onclick="goStage('undercut')">Continue to Undercut Banks →</button>
      </div>
    `;
    return c;
  }

  // Sampling phase: pick 11 particles per cross-section
  const next = currentPicks.length;
  // For each pick, generate a random "blind-grab" particle
  // Difficulty: user has to classify with the gravelometer (compare to bins)

  c.innerHTML = `
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 12px;">
      <h3 class="display" style="margin: 0; font-size: 22px;">
        Substrate · sampling
        <span style="color: var(--ink-faint); font-size: 16px; font-style: italic;">CS${csIdx+1} of 6 · point ${next+1}/${PICKS_PER_CS}</span>
      </h3>
      <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
        ${whyButton('substrate')}
        <div style="display: flex; gap: 6px;">
          ${state.substrateCrossSections.map((cs, i) => {
            const picks = state.substratePicks.filter(p => p.cs === i).length;
            const done = picks === PICKS_PER_CS;

  `;

  setTimeout(() => {
    const game = c.querySelector('#sub-game');
    drawParticleGame(game, csIdx, next);
  }, 0);

  return c;
}

// Generate a "next particle" for the user to classify
function generateParticle(csIdx, pointIdx) {
  // Use a deterministic seed-ish approach
  const seed = csIdx * 13 + pointIdx * 7 + 3;
  // Riffles tend to have larger substrate; runs medium; pools finer
  const cs = state.substrateCrossSections[csIdx];
  const baseLogSize = cs.unitType === 'riffle' ? 4.2 : cs.unitType === 'run' ? 3.5 : 2.0; // log2 of size in mm
  const variance = 1.6;
  // Use seedrandom-like approach
  const rand = () => {
    const x = Math.sin(seed * 9.7 + pointIdx * 11.3 + csIdx * 17.1) * 10000;
    return x - Math.floor(x);
  };
  const r1 = rand();
  const r2 = (Math.sin(seed * 5.5 + 1.3) * 10000) % 1;
  let logSize = baseLogSize + (r1 - 0.5) * 2 * variance;
  let size = Math.pow(2, logSize);
  // Occasionally bedrock
  if (r2 > 0.95) return { kind: 'bedrock', size: 9999, true_class: 'bedrock' };
  if (size < 0.5) size = 0.5;

  // Determine TRUE size class
  let trueClass = '>180';
  for (const sc of SIZE_CLASSES) {
    if (sc.label === 'bedrock') continue;
    if (size <= sc.max) {
      if (sc.label === 'fines' && size < 2) trueClass = (r1 > 0.5 ? 'fines' : 'sand');
      else trueClass = sc.label;
      break;
    }
  }
  return { kind: 'particle', size, true_class: trueClass };
}

          ${particle.kind === 'bedrock' ? `

          ${particle.kind === 'bedrock' ? 'You hit solid bedrock — there is no particle to pick up. Record "bedrock".' : `Point #${pointIdx+1} of 5 at this cross-section. Look away, drop your finger to the bed, pick up the first particle you feel. Use the gravelometer to find the smallest opening it <i>does not</i> fit through — that's its size class.`}
        </div>
      </div>
      <div>
        <h5 style="margin: 0 0 10px; font-family: 'JetBrains Mono'; font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em;">Gravelometer</h5>
        <div style="display: flex; flex-direction: column; gap: 5px;">
          ${SIZE_CLASSES.map(sc => `
            <button onclick="window.__pickSize('${sc.label}')"
                    style="display: flex; justify-content: space-between; align-items: center; gap: 10px;
                           padding: 8px 12px; border: 1.5px solid var(--ink); background: ${sc.color}; color: ${['fines','sand','4','8'].includes(sc.label) ? 'var(--ink)' : 'var(--paper)'};
                           font-family: 'JetBrains Mono'; font-size: 11px; cursor: pointer; transition: transform 0.1s;
                           ${particle.kind === 'bedrock' && sc.label !== 'bedrock' ? 'opacity: 0.4;' : ''}"
                    onmouseover="this.style.transform='translateX(4px)'" onmouseout="this.style.transform='translateX(0)'">
              <span>${sc.label}${sc.label !== 'bedrock' && sc.label !== 'fines' && sc.label !== 'sand' && sc.label !== '>180' ? ' mm' : ''}</span>
              <span style="font-size: 10px; opacity: 0.7;">${sc.label === 'fines' ? '<2mm smooth' : sc.label === 'sand' ? '<2mm gritty' : sc.label === '>180' ? '> 180' : sc.label === 'bedrock' ? 'in place' : '≤ ' + sc.max + 'mm'}</span>
            </button>

    </div>
  `;

  window.__pickSize = (label) => {
    sfx.particlePick();

      toast('That looked like bedrock — record "bedrock".', 'bad', 2500);
      return;
    }
    if (label === 'bedrock' && particle.kind !== 'bedrock') {
      toast('It\'s a particle, not bedrock — try again.', 'bad', 2200);

    }
    const correct = label === particle.true_class || (label === 'sand' && particle.true_class === 'fines') || (label === 'fines' && particle.true_class === 'sand');

}

function drawParticleSVG(sizeMm) {
  // Visualize particle. Scale: 1mm = 1px, capped to a sensible viewport
  const px = Math.min(180, Math.max(8, sizeMm * 1.4));
  // Generate a blobby polygon
  const N = 12;
  const pts = [];
  for (let i = 0; i < N; i++) {
    const ang = (i / N) * Math.PI * 2;
    const r = px/2 * (0.85 + 0.18 * Math.sin(ang*3 + sizeMm * 0.3) + 0.1 * Math.cos(ang * 4));
    pts.push([Math.cos(ang) * r, Math.sin(ang) * r]);
  }
  const path = pts.map((p, i) => `${i===0?'M':'L'} ${p[0]} ${p[1]}`).join(' ') + ' Z';
  // Color: bigger = darker
  const sc = SIZE_CLASSES.find(s => sizeMm <= s.max) || SIZE_CLASSES[10];
  return `
    <svg viewBox="-100 -100 200 200" style="width: 70%; max-width: 320px; display: block; margin: 12px auto;">
      <defs>
        <radialGradient id="rock-grad" cx="0.4" cy="0.3">
          <stop offset="0%" stop-color="${sc.color}" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="${'#2a2418'}" stop-opacity="0.95"/>
        </radialGradient>
      </defs>
      <path d="${path}" fill="url(#rock-grad)" stroke="${'#2a2418'}" stroke-width="1.5"/>
      ${[...Array(8)].map((_,i) => {
        const ang = i / 8 * Math.PI * 2 + sizeMm * 0.1;
        const r = px/2 * 0.5 * (0.6 + 0.4 * Math.sin(ang * 3));
        return `<circle cx="${Math.cos(ang)*r*0.7}" cy="${Math.sin(ang)*r*0.7}" r="${1.5 + (i%3)}" fill="${'#2a2418'}" opacity="${0.18 + 0.1 * Math.sin(ang*5)}"/>`;
      }).join('')}
      <!-- ruler bottom -->
      <line x1="-${px/2}" y1="${px/2 + 14}" x2="${px/2}" y2="${px/2 + 14}" stroke="${'#2a2418'}" stroke-width="1"/>
      <line x1="-${px/2}" y1="${px/2 + 11}" x2="-${px/2}" y2="${px/2 + 17}" stroke="${'#2a2418'}" stroke-width="1"/>
      <line x1="${px/2}" y1="${px/2 + 11}" x2="${px/2}" y2="${px/2 + 17}" stroke="${'#2a2418'}" stroke-width="1"/>
      <text x="0" y="${px/2 + 28}" text-anchor="middle" font-family="JetBrains Mono" font-size="11" fill="${'#2a2418'}">${sizeMm.toFixed(1)} mm</text>
    </svg>
  `;
}

function showEmbeddedness(callback) {
  // Modal overlay
  const overlay = document.createElement('div');
  overlay.style.cssText = `position: fixed; inset: 0; background: rgba(40,30,10,0.6); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px;`;
  let buried = 30, fines = 50;

  function rerender() {
    const buriedFrac = buried / 100;
    const finesFrac = fines / 100;
    overlay.innerHTML = `
      <div class="panel" style="max-width: 540px; width: 100%; padding: 28px;">
        <h3 class="display" style="margin: 0 0 8px; font-size: 24px;">Cobble embeddedness</h3>
        <p style="margin: 0 0 18px; font-size: 13px; color: var(--ink-soft); line-height: 1.5;">
          For cobble-class particles (64–180 mm), estimate two things in the field:
        </p>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 18px;">
          <div>
            <div style="font-family: 'JetBrains Mono'; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px;">% Buried</div>
            <svg viewBox="0 0 100 100" style="width: 100%; background: ${'#a89070'}; border: 1.5px solid var(--ink);">
              <rect x="0" y="${50}" width="100" height="50" fill="${'#876e4e'}"/>
              <line x1="0" y1="50" x2="100" y2="50" stroke="${'#5a4f38'}" stroke-width="1" stroke-dasharray="3 2"/>
              <ellipse cx="50" cy="${50 - 28 + buriedFrac * 56}" rx="32" ry="28" fill="${'#585020'}" stroke="${'#2a2418'}" stroke-width="1.5"/>
              <text x="50" y="14" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="${'#fdfaf0'}" font-weight="600">streambed surface ↑</text>
            </svg>
            <input type="range" min="0" max="100" step="5" value="${buried}" oninput="window.__updBur(this.value)" style="width: 100%; margin-top: 8px;"/>
            <div style="text-align: center; font-family: 'JetBrains Mono'; font-size: 18px; font-weight: 600;">${buried}%</div>
          </div>
          <div>
            <div style="font-family: 'JetBrains Mono'; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px;">% Fines around it</div>
            <svg viewBox="0 0 100 100" style="width: 100%; background: ${'#876e4e'}; border: 1.5px solid var(--ink);">
              ${(() => {
                let dots = '';
                const nFines = Math.round(finesFrac * 60);
                const nCoarse = 60 - nFines;
                for (let i = 0; i < nFines; i++) {
                  const x = ((i * 7.3) % 95) + 2.5;
                  const y = ((i * 11.7) % 95) + 2.5;
                  dots += `<circle cx="${x}" cy="${y}" r="1.2" fill="${'#c08a2a'}" opacity="0.85"/>`;
                }
                for (let i = 0; i < nCoarse; i++) {
                  const x = ((i * 5.1 + 3) % 95) + 2.5;
                  const y = ((i * 13.3 + 5) % 95) + 2.5;
                  dots += `<circle cx="${x}" cy="${y}" r="2.5" fill="${'#585020'}" opacity="0.85"/>`;
                }
                return dots;
              })()}
              <circle cx="50" cy="50" r="14" fill="${'#383812'}" stroke="${'#2a2418'}" stroke-width="1.5"/>
              <text x="50" y="54" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="${'#fdfaf0'}" font-weight="600">cobble</text>
            </svg>
            <input type="range" min="0" max="100" step="5" value="${fines}" oninput="window.__updFines(this.value)" style="width: 100%; margin-top: 8px;"/>
            <div style="text-align: center; font-family: 'JetBrains Mono'; font-size: 18px; font-weight: 600;">${fines}%</div>
          </div>
        </div>
        <div style="margin-top: 18px; padding: 10px 14px; background: rgba(74,104,120,0.08); border-left: 3px solid var(--water); font-size: 13px;">
          Embeddedness = % buried × % fines / 100 = <b>${((buriedFrac * fines)).toFixed(1)}%</b>
        </div>
        <div style="margin-top: 18px; display: flex; gap: 10px; justify-content: flex-end;">
          <button class="btn" onclick="window.__embCancel()">Skip (0%)</button>
          <button class="btn btn-primary" onclick="window.__embOK()">Record</button>
        </div>
      </div>
    `;
    window.__updBur = v => { buried = +v; rerender(); };
    window.__updFines = v => { fines = +v; rerender(); };
    window.__embOK = () => { overlay.remove(); callback(buried, fines); };
    window.__embCancel = () => { overlay.remove(); callback(0, 0); };
  }
  rerender();
  document.body.appendChild(overlay);
}

// STAGE 5: UNDERCUT BANKS
// =====================================================================
// Show several candidate undercut banks. User decides which qualify.

const CANDIDATE_UNDERCUTS = [
  { id: 1, length: 1.4, depth_avg: 35, ceiling: 0.6, w25: 32, w50: 38, w75: 35, fish_cover: true, bank: 'L', unit: 3, position: 0.28 },
  { id: 2, length: 0.7, depth_avg: 40, ceiling: 0.5, w25: 45, w50: 38, w75: 36, fish_cover: true, bank: 'R', unit: 4, position: 0.38 },
  { id: 3, length: 1.6, depth_avg: 18, ceiling: 0.7, w25: 22, w50: 18, w75: 14, fish_cover: true, bank: 'L', unit: 6, position: 0.62 },
  { id: 4, length: 1.1, depth_avg: 45, ceiling: 1.4, w25: 48, w50: 45, w75: 42, fish_cover: true, bank: 'R', unit: 7, position: 0.72 },
  { id: 5, length: 1.2, depth_avg: 28, ceiling: 0.4, w25: 30, w50: 26, w75: 28, fish_cover: false, bank: 'L', unit: 8, position: 0.83 },
  { id: 6, length: 2.1, depth_avg: 30, ceiling: 0.55, w25: 32, w50: 30, w75: 28, fish_cover: true, bank: 'R', unit: 9, position: 0.95 },
];

function trueQualifies(u) {
  return u.length >= 1.0 && u.depth_avg >= 20 && u.ceiling <= 1.0 && u.fish_cover;
}

function stageUndercut() {
  const el = document.createElement('div');

  // Show all candidates as cards; user judges each
  const cards = CANDIDATE_UNDERCUTS.map(u => {
    const decision = state.undercutDecisions.find(d => d.id === u.id);
    return undercutCard(u, decision);
  });

  el.innerHTML = `
    <div class="panel" style="padding: 22px; margin-bottom: 18px;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 12px; flex-wrap: wrap;">
        <h3 class="display" style="margin: 0; font-size: 22px;">Undercut Banks · qualify each candidate</h3>
        <div style="display: flex; gap: 10px; align-items: center;">
          ${whyButton('undercut')}
          <span class="tag" style="color: var(--rust);">stage 05</span>
        </div>
      </div>
      <p style="font-size: 14px; color: var(--ink-soft); line-height: 1.6; margin: 0;">
        An undercut qualifies as fish habitat only if all of these are true:
        depth ≥ <b>20 cm</b>, length ≥ <b>1 m</b>, ceiling ≤ <b>1 m</b> above water, and it provides cover at sampling time.
        Your job: read each candidate's measurements and decide whether to <b>record</b> or <b>skip</b>.
      </p>
    </div>
    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px;" id="uc-grid">
      ${cards.join('')}
    </div>
    <div id="uc-action" style="margin-top: 22px;"></div>
  `;

  setTimeout(() => {
    window.__decideUC = (id, qualifies) => {
      const u = CANDIDATE_UNDERCUTS.find(x => x.id === id);
      const correct = (qualifies ? trueQualifies(u) : !trueQualifies(u));
      const existing = state.undercutDecisions.findIndex(d => d.id === id);
      const decision = { id, qualifies, correct };
      if (existing >= 0) state.undercutDecisions[existing] = decision;
      else state.undercutDecisions.push(decision);
      if (correct) sfx.success(); else sfx.error();
      render();
    };
    window.__finishUC = () => {
      const correct = state.undercutDecisions.filter(d => d.correct).length;
      const total = CANDIDATE_UNDERCUTS.length;
      const pct = (correct/total)*100;
      state.undercutComplete = true;
      state.score.undercut = Math.round(pct);
      state.scoreNotes.undercut.push(`${correct}/${total} undercuts evaluated correctly (${pct.toFixed(0)}%).`);
      sfx.stageComplete();
      render();
    };

    const action = el.querySelector('#uc-action');
    if (state.undercutDecisions.length === CANDIDATE_UNDERCUTS.length && !state.undercutComplete) {
      action.innerHTML = `<div style="text-align: right;"><button class="btn btn-primary" onclick="window.__finishUC()">Score undercuts →</button></div>`;
    } else if (state.undercutComplete) {
      const correct = state.undercutDecisions.filter(d => d.correct).length;
      action.innerHTML = `
        <div class="panel" style="padding: 18px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;">
          <div>
            <div style="font-family: 'JetBrains Mono'; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-soft);">Result</div>
            <div class="display" style="font-size: 28px;">${correct}/${CANDIDATE_UNDERCUTS.length} correct decisions</div>
            <div style="font-size: 13px; color: var(--ink-soft); margin-top: 4px;">
              ${(() => {
                const wrong = state.undercutDecisions.filter(d => !d.correct);
                if (wrong.length === 0) return 'Every candidate evaluated correctly — well-read protocol.';
                return 'Misses: ' + wrong.map(d => {
                  const u = CANDIDATE_UNDERCUTS.find(x => x.id === d.id);
                  const reasons = [];
                  if (u.length < 1.0) reasons.push('length < 1m');
                  if (u.depth_avg < 20) reasons.push('depth < 20cm');
                  if (u.ceiling > 1.0) reasons.push('ceiling > 1m');
                  if (!u.fish_cover) reasons.push('no cover');
                  return `#${d.id} (${reasons.length ? reasons.join(', ') : 'qualifies — ' + u.length + 'm long, ' + u.depth_avg + 'cm deep'})`;
                }).join('; ');
              })()}
            </div>
          </div>
          <button class="btn btn-primary" onclick="goStage('summary')">View field report →</button>
        </div>
      `;
    }
  }, 0);

  return el;
}

function undercutCard(u, decision) {
  const reasons = [];
  if (u.length < 1.0) reasons.push({ ok: false, txt: `length ${u.length} m`, req: '≥ 1.0' });
  else reasons.push({ ok: true, txt: `length ${u.length} m`, req: '≥ 1.0' });
  if (u.depth_avg < 20) reasons.push({ ok: false, txt: `depth ${u.depth_avg} cm`, req: '≥ 20' });
  else reasons.push({ ok: true, txt: `depth ${u.depth_avg} cm`, req: '≥ 20' });
  if (u.ceiling > 1.0) reasons.push({ ok: false, txt: `ceiling ${u.ceiling} m`, req: '≤ 1.0' });
  else reasons.push({ ok: true, txt: `ceiling ${u.ceiling} m`, req: '≤ 1.0' });
  reasons.push({ ok: u.fish_cover, txt: u.fish_cover ? 'provides cover' : 'NO cover', req: 'must' });

  const trueQ = trueQualifies(u);
  const userDecided = !!decision;

  // Side-view sketch: shows water surface, bank lip with overhang, undercut depth, ceiling height
  // Coordinate scaling: 1 cm = 1 px-ish, ceiling in meters → cm
  const ceilingPx = u.ceiling * 60;       // ceiling height in px
  const depthPx = u.depth_avg * 1.5;       // undercut depth (back of cave) in px
  const waterY = 100;
  const lipY = waterY - ceilingPx;         // lip of the undercut
  const bankLeft = 30;
  const undercutBackX = bankLeft + depthPx;

  return `
    <div class="panel hover-lift" style="padding: 14px; ${userDecided ? `border-left: 6px solid ${decision.correct ? 'var(--green-ok)' : 'var(--red-bad)'};` : ''}">
      <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px;">
        <h4 class="display" style="margin: 0; font-size: 18px;">Candidate #${u.id}</h4>
        <span style="font-family: 'JetBrains Mono'; font-size: 10px; color: var(--ink-faint);">unit ${u.unit} · ${u.bank} bank</span>
      </div>
      <!-- Cross-section sketch (side view, looking downstream) -->
      <svg viewBox="0 0 240 130" style="width: 100%; background: linear-gradient(180deg, #f0e8d6 0%, #d4c094 60%); border: 1px solid var(--ink-faint);">
        <defs>
          <pattern id="bank-tex-${u.id}" width="6" height="6" patternUnits="userSpaceOnUse">
            <circle cx="2" cy="2" r="0.6" fill="#5a4f38" opacity="0.4"/>
            <circle cx="4" cy="4" r="0.5" fill="#5a4f38" opacity="0.3"/>
          </pattern>
        </defs>
        <!-- Bank earth (above the undercut and behind it) -->
        <path d="M 0 0 L 240 0 L 240 ${waterY} L ${undercutBackX} ${waterY} L ${undercutBackX} ${lipY} L ${bankLeft} ${lipY} L ${bankLeft} 0 Z"
              fill="#a89070"/>
        <path d="M 0 0 L 240 0 L 240 ${waterY} L ${undercutBackX} ${waterY} L ${undercutBackX} ${lipY} L ${bankLeft} ${lipY} L ${bankLeft} 0 Z"
              fill="url(#bank-tex-${u.id})"/>
        <!-- Bank below water surface (behind undercut back wall) -->
        <rect x="${undercutBackX}" y="${waterY}" width="${240 - undercutBackX}" height="${130 - waterY}" fill="#876e4e"/>
        <!-- Water (in the undercut + to the right) -->
        <rect x="${bankLeft}" y="${waterY - 4}" width="${240 - bankLeft}" height="${130 - waterY + 4}" fill="url(#cs-water-grad)" opacity="0.9"/>
        <!-- Re-overlay bank lip so water is "under" the overhang -->
        <path d="M 0 0 L ${bankLeft} 0 L ${bankLeft} ${lipY} L ${undercutBackX} ${lipY} Q ${undercutBackX + 8} ${lipY + 4} ${undercutBackX} ${waterY - 2} L ${undercutBackX} ${130} L 0 ${130} Z"
              fill="#a89070"/>
        <!-- Water fill in the undercut cavity -->
        <rect x="${bankLeft}" y="${lipY}" width="${depthPx}" height="${waterY - lipY}" fill="#4a6878" opacity="0.55"/>
        <!-- Water surface -->
        <line x1="${bankLeft}" y1="${waterY}" x2="240" y2="${waterY}" stroke="#fdfaf0" stroke-width="0.8" opacity="0.85" stroke-dasharray="2 2"/>
        <!-- Undercut back wall outline -->
        <line x1="${undercutBackX}" y1="${lipY}" x2="${undercutBackX}" y2="${waterY}" stroke="#5a4f38" stroke-width="1"/>
        <line x1="${bankLeft}" y1="${lipY}" x2="${undercutBackX}" y2="${lipY}" stroke="#5a4f38" stroke-width="1"/>

        <!-- Dimension: depth (horizontal arrow) -->
        <g stroke="#b4471f" stroke-width="0.8" fill="#b4471f">
          <line x1="${bankLeft}" y1="${(lipY + waterY)/2}" x2="${undercutBackX}" y2="${(lipY + waterY)/2}"/>
          <polygon points="${bankLeft},${(lipY+waterY)/2} ${bankLeft+4},${(lipY+waterY)/2 - 2} ${bankLeft+4},${(lipY+waterY)/2 + 2}"/>
          <polygon points="${undercutBackX},${(lipY+waterY)/2} ${undercutBackX-4},${(lipY+waterY)/2 - 2} ${undercutBackX-4},${(lipY+waterY)/2 + 2}"/>
          <text x="${(bankLeft + undercutBackX)/2}" y="${(lipY + waterY)/2 - 4}" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#b4471f" stroke="none">${u.depth_avg} cm</text>
        </g>
        <!-- Dimension: ceiling (vertical arrow) -->
        <g stroke="#2a2418" stroke-width="0.8" fill="#2a2418">
          <line x1="14" y1="${lipY}" x2="14" y2="${waterY}"/>
          <polygon points="14,${lipY} 12,${lipY+4} 16,${lipY+4}"/>
          <polygon points="14,${waterY} 12,${waterY-4} 16,${waterY-4}"/>
          <text x="2" y="${(lipY+waterY)/2 + 3}" font-family="JetBrains Mono" font-size="9" fill="#2a2418" stroke="none">${u.ceiling}m</text>
        </g>
        <!-- Length annotation -->
        <text x="120" y="123" text-anchor="middle" font-family="Caveat" font-size="14" fill="#2a2418">length: ${u.length} m (along edge)</text>
        <!-- Cover indicator -->
        ${u.fish_cover ? `<text x="${bankLeft + depthPx/2}" y="${waterY + 16}" text-anchor="middle" font-size="14">🐟</text>` : ''}
      </svg>
      <!-- Criteria checklist -->
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4px 10px; margin: 12px 0;">
        ${reasons.map(r => `
          <div style="display: flex; gap: 6px; font-size: 12px; align-items: center; color: ${r.ok ? 'var(--green-ok)' : 'var(--red-bad)'};">
            <span style="font-weight: 700;">${r.ok ? '✓' : '✗'}</span>
            <span>${r.txt}</span>
            ${r.req !== 'must' ? `<span style="color: var(--ink-faint); font-size: 10px;">(${r.req})</span>` : ''}
          </div>
        `).join('')}
      </div>
      <div style="display: flex; gap: 6px;">
        <button class="btn ${userDecided && decision.qualifies ? 'btn-primary' : ''}"
                style="flex: 1; padding: 6px 10px; font-size: 10px; ${userDecided && !decision.qualifies ? 'opacity: 0.5;' : ''}"
                onclick="window.__decideUC(${u.id}, true)">Record</button>
        <button class="btn ${userDecided && !decision.qualifies ? 'btn-primary' : ''}"
                style="flex: 1; padding: 6px 10px; font-size: 10px; ${userDecided && decision.qualifies ? 'opacity: 0.5;' : ''}"
                onclick="window.__decideUC(${u.id}, false)">Skip</button>
      </div>
      ${userDecided ? `
        <div style="margin-top: 10px; padding: 6px 10px; font-size: 11px; background: ${decision.correct ? 'rgba(74,125,61,0.12)' : 'rgba(168,58,44,0.12)'}; border-left: 3px solid ${decision.correct ? 'var(--green-ok)' : 'var(--red-bad)'};">
          ${decision.correct ? '✓ Correct.' : `✗ Should ${trueQ ? 'be recorded' : 'be skipped'}.`}
        </div>
      ` : ''}
    </div>
  `;
}

  const max = 5 * 100;

          ['Avg BFW', avgBfw + ' m', 'site layout'],

          ['Channel Units', state.score.units, state.scoreNotes.units],

        `).join('')}
      </div>

      <div style="display: flex; gap: 16px; align-items: center; padding: 18px; background: ${pct >= 70 ? 'rgba(74,125,61,0.1)' : 'rgba(192,138,42,0.1)'}; border-left: 4px solid ${pct >= 70 ? 'var(--green-ok)' : 'var(--gold)'};">
        <div class="display" style="font-size: 60px; line-height: 1; color: ${pct >= 70 ? 'var(--green-ok)' : 'var(--gold)'};">${Math.round(pct)}%</div>
        <div>
          <div style="font-family: 'JetBrains Mono'; font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--ink-soft);">Overall</div>
          <div style="font-size: 16px; line-height: 1.4; margin-top: 4px;">
            ${pct >= 90 ? `<b>Excellent work.</b> You'd be ready for solo fieldwork after a tag-along day with an experienced crew.` :
              pct >= 70 ? `<b>Solid.</b> A few details to refine — review notes above.` :
              pct >= 50 ? `<b>Decent first run.</b> Re-read the protocol on the weakest stage and try again.` :
              `<b>Keep going.</b> The protocol takes practice; understand <i>why</i> each step exists, not just what to do.`}
          </div>
        </div>
      </div>

      <div style="margin-top: 28px; display: flex; gap: 12px; justify-content: space-between; flex-wrap: wrap;">
        <button class="btn" onclick="window.__restart()">↺ Run again</button>
        <button class="btn btn-primary" onclick="window.print()">⎙ Print report</button>
      </div>
    </div>

    <div class="panel" style="padding: 22px;">
      <h4 class="display" style="margin: 0 0 12px; font-size: 18px;">Reflection prompts</h4>
      <p style="font-size: 13px; color: var(--ink-soft); margin: 0 0 14px; font-style: italic;">From the worksheets — useful to think through after the simulator:</p>
      <ol style="font-family: 'Cormorant Garamond', serif; font-size: 16px; line-height: 1.7; padding-left: 22px;">
        <li>Why might we conduct a habitat assessment in the first place?</li>
        <li>What is a transect, and why do we use them?</li>
        <li>How would your transect spacing differ between a 1 m headwater stream and a 20 m main-stem river? Why?</li>
        <li>Why are <b>pools</b> important for salmon? Why are <b>riffles</b> important?</li>
        <li>What is cobble embeddedness, and what does a high value tell you about the stream?</li>
        <li>Why do undercut banks need to be <i>continuous</i> and provide <i>cover at sampling time</i>?</li>
        <li>List sources of measurement error in this simulator. What did the simulator <i>not</i> show that you'd encounter in the field?</li>
      </ol>
    </div>
  `;

  return el;
}

function resetSimState() {
  Object.assign(state, {
    stage: 'intro',
    bankfullMeasurements: [],
    widthCategory: null,
    transectsPlaced: 0,
    transectsLocked: false,
    csTransect: 1,
    csMeasurements: [],
    csComplete: false,
    unitBoundaries: [0, 1.0],
    unitClassifications: [],
    unitsComplete: false,
    substrateCrossSections: [],
    substratePicks: [],
    substrateComplete: false,
    undercutDecisions: [],
    undercutComplete: false,
    score: { layout: 0, crosssection: 0, units: 0, substrate: 0, undercut: 0 },
    scoreNotes: { layout: [], crosssection: [], units: [], substrate: [], undercut: [] },
    unitsWrong: null,
    _substrateFinalSoundPlayed: false,
    _samplingStarted: false,
  });
  // Forget coach marks so they fire again on the next run-through
  seenCoachMarks.clear();
  dismissCoach();
}

window.__restart = () => {
  resetSimState();
  render();
};

// Confirmation-prompted restart for the header button
window.__restartWithConfirm = () => {
  // Detect whether there's any progress worth confirming. If user is on intro
  // and hasn't done anything, just no-op (or play a tick).
  const hasProgress =
    state.bankfullMeasurements.length > 0 ||
    state.transectsPlaced > 0 ||
    state.csMeasurements.length > 0 ||
    state.unitBoundaries.length > 2 ||
    state.substrateCrossSections.length > 0 ||
    state.undercutDecisions.length > 0 ||
    state.stage !== 'intro';

  if (!hasProgress) {
    sfx.tick();
    toast('Already at the start — nothing to reset.', 'info', 2500);
    return;
  }

  // Show a small confirm modal
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position: fixed; inset: 0; background: rgba(40,30,10,0.7); z-index: 220; display: flex; align-items: center; justify-content: center; padding: 16px; animation: fadein 0.2s;';
  overlay.innerHTML = `
    <div class="panel" style="max-width: 440px; width: 100%; padding: 28px;">
      <h3 class="display" style="margin: 0 0 10px; font-size: 24px;">Restart the simulation?</h3>
      <p style="margin: 0 0 20px; font-size: 14px; line-height: 1.55; color: var(--ink-soft);">
        This will clear all measurements, transects, classifications, and decisions across every stage. You'll go back to the intro screen with a fresh site.
      </p>
      <div style="display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap;">
        <button class="btn restart-cancel" type="button">Cancel</button>
        <button class="btn btn-primary restart-confirm" type="button">↺ Yes, restart</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  const close = () => { overlay.remove(); document.removeEventListener('keydown', onKey); };
  const onKey = (e) => { if (e.key === 'Escape') close(); };
  document.addEventListener('keydown', onKey);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
  overlay.querySelector('.restart-cancel').addEventListener('click', () => { sfx.tick(); close(); });
  overlay.querySelector('.restart-confirm').addEventListener('click', () => {
    sfx.toggle();
    close();
    resetSimState();
    render();
    toast('Simulation restarted. Fresh site, fresh crew.', 'ok', 3000);
  });
};
